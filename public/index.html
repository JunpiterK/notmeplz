    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A;--glass:rgba(255,255,255,0.1)}
        body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;color:#fff}

        /* Stars background */
        .stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
        .star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
        @keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

        /* Layout */
        .container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:40px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center}

        /* Header */
        .header{text-align:center;margin-bottom:50px}
        .logo{font-family:'Orbitron',sans-serif;font-size:3em;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;margin-bottom:8px}
        .tagline{font-size:1.1em;color:rgba(255,255,255,0.6);letter-spacing:1px}

        /* Language selector */
        .lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
        .lang-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 8px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:4px;font-size:0.75em;color:rgba(255,255,255,0.5)}
        .lang-btn:hover{border-color:var(--primary);background:rgba(255,107,53,0.1)}
        .lang-btn.active{border-color:var(--primary);background:rgba(255,107,53,0.15);color:#fff}
        .lang-btn img{width:20px;height:14px;border-radius:2px;object-fit:cover}

        /* Games grid */
        .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;width:100%;max-width:900px}
        .game-card{background:linear-gradient(145deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02));border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:20px 14px;text-align:center;cursor:pointer;transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);text-decoration:none;color:#fff;position:relative;overflow:hidden}
        .game-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));opacity:0;transition:opacity 0.3s}
        .game-card:hover{transform:translateY(-6px);border-color:rgba(255,107,53,0.3);box-shadow:0 16px 40px rgba(255,107,53,0.15)}
        .game-card:hover::before{opacity:1}
        .game-icon{font-size:2.2em;margin-bottom:8px;display:block}
        .game-name{font-family:'Orbitron',sans-serif;font-size:0.9em;font-weight:700;margin-bottom:4px;color:var(--accent)}
        .game-desc{font-size:0.72em;color:rgba(255,255,255,0.45);line-height:1.4}
        .game-badge{display:inline-block;font-size:0.6em;padding:2px 7px;border-radius:8px;margin-top:6px;font-weight:700;letter-spacing:0.5px}
        .badge-live{background:rgba(0,255,136,0.15);color:var(--success);border:1px solid rgba(0,255,136,0.3)}
        .badge-soon{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.1)}

        .game-card.coming-soon{opacity:0.45;cursor:default}
        .game-card.coming-soon:hover{transform:none;border-color:rgba(255,255,255,0.08);box-shadow:none}
        .game-card.coming-soon::before{display:none}

        .auth-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.7);font-size:0.8em;font-weight:700;cursor:pointer;backdrop-filter:blur(10px);transition:all 0.3s;text-decoration:none}

let currentLang = 'en';

function detectBrowserLang() {
    const langMap = { 'ko':'ko','en':'en','es':'es','de':'de','fr':'fr','ja':'ja','zh':'zh','pt':'pt','ru':'ru','ar':'ar','hi':'hi','th':'th','id':'id','vi':'vi','tr':'tr' };
    const langs = navigator.languages || [navigator.language || navigator.userLanguage || 'en'];
    for (const locale of langs) {
        const code = locale.toLowerCase();
        if (code === 'en-gb') return 'gb';
        const primary = code.split('-')[0];
        if (langMap[primary]) return langMap[primary];
    }
    return 'en';
}

function T(key) {
    return (I18N[currentLang] && I18N[currentLang][key]) || (I18N.en[key] || key);
}

function renderGames() {
    const grid = document.getElementById('gamesGrid');
    grid.innerHTML = GAMES.map(g => {
        const cls = g.live ? 'game-card' : 'game-card coming-soon';
        const badge = g.live
            ? `<span class="game-badge badge-live">${T('playNow')}</span>`
            : `<span class="game-badge badge-soon">${T('comingSoon')}</span>`;
        const tag = g.live ? 'a' : 'div';
        const href = g.live ? ` href="${g.url}"` : '';
        return `<${tag} class="${cls}"${href}>
            <span class="game-icon">${g.icon}</span>
            <div class="game-name">${T(g.nameKey)}</div>
            <div class="game-desc">${T(g.descKey)}</div>
            ${badge}
        </${tag}>`;
    }).join('');
}

function applyLanguage() {
    document.getElementById('tagline').textContent = T('tagline');
    document.documentElement.lang = currentLang === 'gb' ? 'en-GB' : currentLang;
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === currentLang);
    });
    renderGames();
}

/* Stars */
function createStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const size = Math.random() * 2.5 + 0.5;
        s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;
        c.appendChild(s);
    }
}

/* Init */
function init() {
    const savedLang = localStorage.getItem('gloryCarRacing_lang');
    if (savedLang && I18N[savedLang]) currentLang = savedLang;
    else currentLang = detectBrowserLang();

    createStars();
    applyLanguage();

    document.getElementById('langBar').addEventListener('click', e => {
        const btn = e.target.closest('.lang-btn');
        if (!btn) return;
        currentLang = btn.dataset.lang;
        localStorage.setItem('gloryCarRacing_lang', currentLang);
        applyLanguage();
    });
}

init();
</script>
