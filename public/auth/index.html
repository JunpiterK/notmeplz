    <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;color:#fff;display:flex;justify-content:center;align-items:center;padding:20px}

#dynamicBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse at 30% 30%,rgba(255,107,53,0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 70%,rgba(0,217,255,0.08) 0%,transparent 50%),linear-gradient(180deg,#0A0A1A 0%,#12122A 50%,#0A0A1A 100%)}
.stars{position:fixed;width:100%;height:100%;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

.auth-card{background:linear-gradient(145deg,rgba(20,20,40,0.95),rgba(10,10,30,0.98));backdrop-filter:blur(30px);border-radius:24px;padding:30px;border:2px solid rgba(255,107,53,0.15);box-shadow:0 25px 80px rgba(0,0,0,0.7);width:420px;max-width:96vw;text-align:center}
.auth-card .logo{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;cursor:pointer}
.auth-card .logo:hover{filter:brightness(1.2)}
.auth-card .subtitle{font-size:0.8em;color:rgba(255,255,255,0.4);margin-bottom:20px}

/* Tabs */
.tab-bar{display:flex;gap:0;border-radius:14px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);margin-bottom:20px}
.tab-btn{flex:1;padding:10px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:none;font-size:0.9em;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.tab-btn.active{background:linear-gradient(135deg,var(--primary),#CC5522);color:#fff}

/* Forms */
.form-group{margin:12px 0;text-align:left}
.form-group label{display:block;font-size:0.8em;color:rgba(255,255,255,0.5);margin-bottom:4px;padding-left:4px}
.form-group input{width:100%;padding:12px 16px;border:2px solid rgba(255,255,255,0.1);border-radius:14px;background:rgba(255,255,255,0.06);color:#fff;font-size:0.95em;outline:none;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.form-group input:focus{border-color:var(--primary);background:rgba(255,255,255,0.1);box-shadow:0 0 15px rgba(255,107,53,0.15)}
.form-group input::placeholder{color:rgba(255,255,255,0.2)}

.submit-btn{width:100%;padding:14px;margin-top:16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--danger));color:#fff;font-size:1em;font-weight:900;font-family:'Orbitron',sans-serif;letter-spacing:1px;cursor:pointer;transition:all 0.3s;box-shadow:0 8px 25px rgba(255,107,53,0.3)}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,53,0.4)}
.submit-btn:active{transform:translateY(0)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.forgot-link{display:inline-block;margin-top:10px;font-size:0.8em;color:var(--secondary);cursor:pointer;border:none;background:none;text-decoration:underline}
.forgot-link:hover{color:#fff}

/* Messages */
.msg{padding:10px 14px;border-radius:12px;font-size:0.85em;margin:12px 0;display:none;text-align:center}
.msg.error{display:block;background:rgba(255,51,102,0.15);border:1px solid rgba(255,51,102,0.3);color:var(--danger)}
.msg.success{display:block;background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.3);color:var(--success)}
.msg.info{display:block;background:rgba(0,217,255,0.1);border:1px solid rgba(0,217,255,0.3);color:var(--secondary)}

/* Profile view */
.profile-section{text-align:center}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:2em;font-weight:900;margin:0 auto 12px;border:3px solid rgba(255,255,255,0.2)}
.profile-name{font-family:'Orbitron',sans-serif;font-size:1.3em;font-weight:900;color:var(--accent);margin-bottom:4px}
.profile-email{font-size:0.85em;color:rgba(255,255,255,0.4);margin-bottom:16px}
.profile-badge{display:inline-block;padding:4px 12px;border-radius:10px;font-size:0.7em;font-weight:700;margin-bottom:16px}
.profile-badge.verified{background:rgba(0,255,136,0.15);color:var(--success);border:1px solid rgba(0,255,136,0.3)}
.profile-badge.unverified{background:rgba(255,230,109,0.15);color:var(--accent);border:1px solid rgba(255,230,109,0.3)}

.profile-actions{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.profile-btn{padding:10px;border:none;border-radius:12px;font-size:0.85em;font-weight:700;cursor:pointer;transition:all 0.3s}
.profile-btn:hover{transform:translateY(-1px)}
.profile-btn.home{background:linear-gradient(135deg,var(--secondary),#0099CC);color:#fff}
.profile-btn.logout{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1)}
.profile-btn.logout:hover{background:rgba(255,51,102,0.1);color:var(--danger);border-color:var(--danger)}
.profile-btn.resend{background:rgba(255,230,109,0.1);color:var(--accent);border:1px solid rgba(255,230,109,0.2)}

/* Password reset form */
.reset-section{display:none}
.back-link{font-size:0.8em;color:var(--secondary);cursor:pointer;border:none;background:none;margin-bottom:12px;display:inline-block}

/* Home link */
.home-link{display:inline-block;margin-top:16px;font-size:0.8em;color:rgba(255,255,255,0.4);text-decoration:none;transition:all 0.3s}
.home-link:hover{color:var(--primary)}

@media(max-width:500px){
    .auth-card{padding:20px 16px}
    .auth-card .logo{font-size:1.3em}
    .form-group input{padding:10px 14px;font-size:0.9em}
    .submit-btn{padding:12px;font-size:0.9em}
}
    </style>
</head>
<body>
    <div id="dynamicBg"></div>
    <div class="stars" id="starsContainer"></div>

    <div class="auth-card">
        <div class="logo" onclick="location.href='/'">NotMePlz!</div>
        <div class="subtitle" id="subtitle">Join the fun! Sign in to play with friends.</div>

        <!-- LOGIN / SIGNUP TABS -->
        <div id="authSection">
            <div class="tab-bar">
                <button class="tab-btn active" id="tabLogin" onclick="showTab('login')">Login</button>
                <button class="tab-btn" id="tabSignup" onclick="showTab('signup')">Sign Up</button>
            </div>

            <div id="msgBox" class="msg"></div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label id="lEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label id="lPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                </div>
                <button type="submit" class="submit-btn" id="loginBtn">Login</button>
                <button type="button" class="forgot-link" onclick="showReset()" id="forgotText">Forgot password?</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" style="display:none" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label id="sNickname">Nickname</label>
                    <input type="text" id="signupNickname" placeholder="YourNickname" required minlength="2" maxlength="20" autocomplete="username">
                </div>
                <div class="form-group">
                    <label id="sEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label id="sPassword">Password (6+ characters)</label>
                    <input type="password" id="signupPassword" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label id="sConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="••••••••" required minlength="6" autocomplete="new-password">
                </div>
                <button type="submit" class="submit-btn" id="signupBtn">Sign Up</button>
            </form>
        </div>

        <!-- PASSWORD RESET -->
        <div id="resetSection" class="reset-section">
            <button class="back-link" onclick="hideReset()">← Back to login</button>
            <div id="resetMsg" class="msg"></div>
            <form onsubmit="handleReset(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="resetEmail" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="submit-btn" id="resetBtn">Send Reset Link</button>
            </form>
        </div>

        <!-- PROFILE (logged in) -->
        <div id="profileSection" style="display:none">
            <div class="profile-section">
                <div class="profile-avatar" id="profileAvatar">?</div>
                <div class="profile-name" id="profileName"></div>
                <div class="profile-email" id="profileEmail"></div>
                <div class="profile-badge" id="profileBadge"></div>
                <div id="profileMsg" class="msg"></div>
                <div class="profile-actions">
                    <button class="profile-btn home" onclick="location.href='/'">🎮 Play Games</button>
                    <button class="profile-btn resend" id="resendBtn" style="display:none" onclick="resendVerification()">📧 Resend Verification Email</button>
                    <button class="profile-btn logout" onclick="handleLogout()">Logout</button>
                </div>
            </div>
        </div>

        <a href="/" class="home-link" id="homeLink">🏠 ← Back to games</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/js/supabase-config.js"></script>

let lang='en';
function T(k){return (I18N[lang]&&I18N[lang][k])||I18N.en[k]||k}

/* ===== Stars ===== */
function createStars(){const c=document.getElementById('starsContainer');for(let i=0;i<40;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+0.5;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;c.appendChild(s)}}

/* ===== UI ===== */
function showTab(tab){
    document.getElementById('tabLogin').classList.toggle('active',tab==='login');
    document.getElementById('tabSignup').classList.toggle('active',tab==='signup');
    document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
    document.getElementById('signupForm').style.display=tab==='signup'?'block':'none';
    clearMsg();
}

function showReset(){
    document.getElementById('authSection').style.display='none';
    document.getElementById('resetSection').style.display='block';
}
function hideReset(){
    document.getElementById('resetSection').style.display='none';
    document.getElementById('authSection').style.display='block';
}

function showMsg(text,type='error'){
    const el=document.getElementById('msgBox');
    el.textContent=text;el.className='msg '+type;
}
function clearMsg(){
    const el=document.getElementById('msgBox');
    el.textContent='';el.className='msg';
}

function showProfile(user){
    document.getElementById('authSection').style.display='none';
    document.getElementById('resetSection').style.display='none';
    document.getElementById('profileSection').style.display='block';

    const name=getDisplayName(user);
    document.getElementById('profileAvatar').textContent=name.charAt(0).toUpperCase();
    document.getElementById('profileName').textContent=name;
    document.getElementById('profileEmail').textContent=user.email;

    const verified=user.email_confirmed_at!=null;
    const badge=document.getElementById('profileBadge');
    badge.textContent=verified?'✅ '+T('verified'):'⚠️ '+T('unverified');
    badge.className='profile-badge '+(verified?'verified':'unverified');

    document.getElementById('resendBtn').style.display=verified?'none':'block';
}

function showAuth(){
    document.getElementById('authSection').style.display='block';
    document.getElementById('resetSection').style.display='none';
    document.getElementById('profileSection').style.display='none';
}

function applyLanguage(){
    document.getElementById('subtitle').textContent=T('subtitle');
    document.getElementById('tabLogin').textContent=T('login');
    document.getElementById('tabSignup').textContent=T('signup');
    document.getElementById('lEmail').textContent=T('email');
    document.getElementById('lPassword').textContent=T('password');
    document.getElementById('loginBtn').textContent=T('loginBtn');
    document.getElementById('forgotText').textContent=T('forgot');
    document.getElementById('sNickname').textContent=T('nickname');
    document.getElementById('sEmail').textContent=T('email');
    document.getElementById('sPassword').textContent=T('passwordHint');
    document.getElementById('sConfirm').textContent=T('confirm');
    document.getElementById('signupBtn').textContent=T('signupBtn');
    document.getElementById('resetBtn').textContent=T('resetBtn');
    document.getElementById('homeLink').textContent='🏠 '+T('backToGames');
}

/* ===== Auth Handlers ===== */
async function handleLogin(e){
    e.preventDefault();clearMsg();
    const email=document.getElementById('loginEmail').value.trim();
    const pw=document.getElementById('loginPassword').value;
    document.getElementById('loginBtn').disabled=true;

    const{data,error}=await signIn(email,pw);
    document.getElementById('loginBtn').disabled=false;

    if(error){showMsg(error.message,'error');return}
    showMsg(T('loginSuccess'),'success');
    setTimeout(()=>showProfile(data.user),500);
}

async function handleSignup(e){
    e.preventDefault();clearMsg();
    const nick=document.getElementById('signupNickname').value.trim();
    const email=document.getElementById('signupEmail').value.trim();
    const pw=document.getElementById('signupPassword').value;
    const confirm=document.getElementById('signupConfirm').value;

    if(pw!==confirm){showMsg(T('passwordMismatch'),'error');return}

    document.getElementById('signupBtn').disabled=true;
    const{data,error}=await signUp(email,pw,nick);
    document.getElementById('signupBtn').disabled=false;

    if(error){showMsg(error.message,'error');return}
    showMsg(T('signupSuccess'),'success');
}

async function handleReset(e){
    e.preventDefault();
    const email=document.getElementById('resetEmail').value.trim();
    document.getElementById('resetBtn').disabled=true;
    const{data,error}=await resetPassword(email);
    document.getElementById('resetBtn').disabled=false;

    const el=document.getElementById('resetMsg');
    if(error){el.textContent=error.message;el.className='msg error'}
    else{el.textContent=T('resetSuccess');el.className='msg success'}
}

async function handleLogout(){
    await signOut();
    showAuth();
    showMsg(T('logoutSuccess'),'info');
}

async function resendVerification(){
    const user=await getUser();
    if(!user)return;
    const{error}=await getSupabase().auth.resend({type:'signup',email:user.email});
    const el=document.getElementById('profileMsg');
    if(error){el.textContent=error.message;el.className='msg error'}
    else{el.textContent=T('resendSuccess');el.className='msg success'}
}

/* ===== Init ===== */
async function init(){
    // Language - sync with main page selection
    const saved=localStorage.getItem('gloryCarRacing_lang');
    if(saved&&I18N[saved])lang=saved;
    else{const m={'ko':'ko','en':'en','es':'es','de':'de','fr':'fr','ja':'ja','zh':'zh','pt':'pt','ru':'ru','ar':'ar','hi':'hi','th':'th','id':'id','vi':'vi','tr':'tr'};
    const langs=navigator.languages||[navigator.language||'en'];
    for(const l of langs){if(l.toLowerCase()==='en-gb'){lang='gb';break}const p=l.split('-')[0].toLowerCase();if(m[p]){lang=m[p];break}}}

    createStars();
    applyLanguage();

    // Check URL params
    const params=new URLSearchParams(location.search);
    if(params.get('verified')==='1'){
        showMsg('Email verified! You can now login.','success');
    }

    // Check existing session
    const user=await getUser();
    if(user){
        showProfile(user);
    }

    // Listen for auth changes
    onAuthChange((event,session)=>{
        if(event==='SIGNED_IN'&&session?.user){
            showProfile(session.user);
        }else if(event==='SIGNED_OUT'){
            showAuth();
        }
    });
}

init();
    </script>
