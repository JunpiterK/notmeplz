*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A;--glass:rgba(255,255,255,0.1)}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;color:#fff;-webkit-tap-highlight-color:transparent}

/* === Background === */
#dynamicBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse at 30% 20%,rgba(0,217,255,0.12) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(255,107,53,0.12) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(255,230,109,0.04) 0%,transparent 70%),linear-gradient(180deg,#0A0A1A 0%,#12122A 50%,#0A0A1A 100%)}
.stars{position:fixed;width:100%;height:100%;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* === Setup Screen === */
#setupWrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;justify-content:center;align-items:center;padding:10px;overflow-y:auto}
#setupScreen{position:relative;background:linear-gradient(145deg,rgba(20,20,40,0.95),rgba(10,10,30,0.98));backdrop-filter:blur(30px);border-radius:24px;padding:24px 28px;text-align:center;border:2px solid rgba(0,217,255,0.2);box-shadow:0 25px 80px rgba(0,0,0,0.7),0 0 80px rgba(0,217,255,0.08);max-height:95vh;overflow-y:auto;width:560px;max-width:98vw}
#setupScreen::-webkit-scrollbar{width:6px}
#setupScreen::-webkit-scrollbar-thumb{background:var(--secondary);border-radius:3px}
#setupScreen h1{font-family:'Orbitron',sans-serif;font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--secondary),var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px;letter-spacing:2px}
#setupScreen h2{font-family:'Orbitron',sans-serif;color:rgba(255,255,255,0.4);font-size:0.7em;margin-bottom:16px;font-weight:400;letter-spacing:3px}

/* Language selector */
.lang-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:14px}
.lang-label{font-family:'Orbitron',sans-serif;font-size:0.55em;color:rgba(255,255,255,0.4);letter-spacing:2px}
.lang-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:340px}
.lang-btn{width:30px;height:22px;border:2px solid rgba(255,255,255,0.12);border-radius:5px;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;padding:0;overflow:hidden}
.lang-btn img{width:22px;height:16px;object-fit:cover;border-radius:2px}
.lang-btn:hover{border-color:var(--secondary);transform:scale(1.1)}
.lang-btn.active{border-color:var(--accent);background:rgba(255,230,109,0.15);box-shadow:0 0 8px rgba(255,230,109,0.3)}

/* Sections */
.section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-family:'Orbitron',sans-serif;font-size:0.8em;color:var(--secondary);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

/* Player inputs */
.player-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.player-row .dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);flex-shrink:0;box-shadow:0 3px 10px rgba(0,0,0,0.3)}
.player-row input{flex:1;padding:8px 12px;border:2px solid transparent;border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.9em;outline:none;transition:all 0.3s}
.player-row input:focus{background:rgba(255,255,255,0.12);border-color:var(--secondary)}
.player-row input::placeholder{color:rgba(255,255,255,0.25)}
.player-row .remove-btn{width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,51,102,0.5);color:#fff;font-size:1em;cursor:pointer;flex-shrink:0;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.player-row .remove-btn:hover{background:var(--danger);transform:scale(1.1)}

/* Result inputs */
.result-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.result-row .num{font-family:'Orbitron',sans-serif;font-size:0.7em;color:var(--accent);min-width:20px;text-align:center}
.result-row input{flex:1;padding:8px 12px;border:2px solid transparent;border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.9em;outline:none;transition:all 0.3s}
.result-row input:focus{background:rgba(255,255,255,0.12);border-color:var(--accent)}
.result-row input::placeholder{color:rgba(255,255,255,0.25)}
.clear-btn{width:24px;height:24px;border-radius:50%;border:none;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);font-size:0.9em;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.3s;padding:0}
.clear-btn:hover{background:rgba(255,51,102,0.3);color:#fff}

#addPlayerBtn{width:100%;padding:9px;margin-top:6px;border:2px dashed rgba(255,255,255,0.15);border-radius:16px;background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.4);font-size:0.85em;cursor:pointer;transition:all 0.3s}
#addPlayerBtn:hover{border-color:var(--success);color:var(--success);background:rgba(0,255,136,0.05)}

/* Complexity */
.complexity-cards{display:flex;gap:8px;justify-content:center}
.complexity-card{flex:1;padding:10px 8px;border-radius:12px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.08);cursor:pointer;transition:all 0.3s;text-align:center}
.complexity-card:hover{border-color:rgba(0,217,255,0.3);transform:translateY(-2px)}
.complexity-card.selected{border-color:var(--secondary);background:rgba(0,217,255,0.1);box-shadow:0 0 15px rgba(0,217,255,0.15)}
.complexity-card .cc-icon{font-size:1.5em;display:block;margin-bottom:2px}
.complexity-card .cc-name{font-size:0.7em;color:#fff;font-weight:700}

/* Mode */
.mode-toggle{display:flex;gap:0;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);margin-bottom:10px}
.mode-btn{flex:1;padding:8px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.4);border:none;font-size:0.8em;font-weight:700;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif}
.mode-btn.active{background:linear-gradient(135deg,var(--secondary),#0099CC);color:#fff}

/* Preset buttons */
.preset-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.preset-btn{padding:5px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.5);font-size:0.72em;cursor:pointer;transition:all 0.3s}
.preset-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,230,109,0.08)}

/* Buttons */
.btn-group{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 18px;font-size:0.85em;font-weight:700;color:#fff;border:none;border-radius:20px;cursor:pointer;transition:all 0.3s;font-family:'Noto Sans KR',sans-serif;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent);transition:left 0.5s}
.btn:hover::before{left:100%}
.btn:hover{transform:translateY(-2px)}
.floating-home{position:fixed;bottom:14px;left:14px;z-index:1000;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.5);border:2px solid rgba(255,107,53,0.4);color:#fff;font-size:1.2em;display:flex;align-items:center;justify-content:center;text-decoration:none;backdrop-filter:blur(10px);transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.floating-home:hover{background:rgba(255,107,53,0.3);border-color:var(--primary);transform:scale(1.1)}
#startBtn{padding:14px 36px;font-size:1.1em;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--secondary),var(--primary));box-shadow:0 12px 35px rgba(0,217,255,0.4),0 0 50px rgba(0,217,255,0.15);animation:startPulse 2s ease-in-out infinite}
@keyframes startPulse{0%,100%{box-shadow:0 12px 35px rgba(0,217,255,0.4),0 0 50px rgba(0,217,255,0.15)}50%{box-shadow:0 16px 45px rgba(0,217,255,0.6),0 0 70px rgba(0,217,255,0.3)}}

/* === Game Canvas === */
#gameWrap{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50}
#gameCanvas{display:block;width:100%;height:100%}
#soundToggle{position:fixed;top:12px;left:12px;z-index:200;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:6px 12px;border-radius:20px;cursor:pointer;font-size:0.8em;backdrop-filter:blur(8px);transition:all 0.3s}
#soundToggle:hover{background:rgba(255,255,255,0.15)}

/* === Result Screen === */
#resultScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;justify-content:center;align-items:center;background:rgba(5,5,15,0.92);backdrop-filter:blur(10px);padding:20px;overflow-y:auto}
.result-card{background:linear-gradient(145deg,rgba(15,15,35,0.98),rgba(25,25,55,0.98));border-radius:24px;padding:30px;text-align:center;border:2px solid var(--accent);box-shadow:0 0 80px rgba(255,230,109,0.2),0 30px 60px rgba(0,0,0,0.6);width:520px;max-width:96vw;max-height:90vh;overflow-y:auto}
.result-card::-webkit-scrollbar{width:5px}
.result-card::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
.result-card h1{font-family:'Orbitron',sans-serif;font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:20px}
.match-item{display:flex;align-items:center;padding:12px 14px;margin:8px 0;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);transition:all 0.3s;gap:10px}
.match-item:hover{background:rgba(255,255,255,0.1);transform:translateX(4px)}
.match-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;border:2px solid rgba(255,255,255,0.4)}
.match-name{font-weight:700;font-size:0.95em;flex:1}
.match-arrow{color:var(--accent);font-family:'Orbitron',sans-serif;font-size:1.2em;flex-shrink:0}
.match-result{font-weight:700;font-size:0.9em;color:var(--primary);text-align:right;flex:1}

/* Share */
.share-panel{margin-top:18px}
.share-panel h3{font-family:'Orbitron',sans-serif;font-size:0.75em;color:var(--secondary);margin-bottom:8px;letter-spacing:2px}
.share-buttons{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.share-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border:none;border-radius:16px;font-size:0.75em;font-weight:700;color:#fff;cursor:pointer;transition:all 0.3s}
.share-btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.share-btn.kakao{background:#FEE500;color:#3C1E1E}
.share-btn.line{background:#06C755}
.share-btn.whatsapp{background:#25D366}
.share-btn.telegram{background:#0088CC}
.share-btn.twitter{background:#1DA1F2}
.share-btn.facebook{background:#1877F2}
.share-btn.copy-link{background:linear-gradient(135deg,#667,#445)}
.share-btn.native-share{background:linear-gradient(135deg,var(--primary),var(--accent));display:none}
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--success);color:#000;padding:10px 24px;border-radius:20px;font-weight:700;font-size:0.9em;z-index:400;display:none}

.result-btns{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.result-btns .btn{padding:10px 20px}
.btn-replay{background:linear-gradient(135deg,var(--secondary),#0099CC);box-shadow:0 8px 25px rgba(0,217,255,0.3)}

/* === Confetti canvas === */
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:350}

/* === Responsive === */
@media(max-width:500px){
    #setupScreen{padding:16px 12px;border-radius:16px}
    #setupScreen h1{font-size:1.3em}
    #setupScreen h2{font-size:0.6em}
    .section{padding:10px}
    .player-row input,.result-row input{font-size:0.82em;padding:6px 10px}
    .player-row .dot{width:20px;height:20px}
    #startBtn{padding:12px 24px;font-size:0.95em}
    .complexity-card{padding:8px 4px}
    .complexity-card .cc-icon{font-size:1.2em}
    .complexity-card .cc-name{font-size:0.6em}
    .result-card{padding:20px 14px}
    .result-card h1{font-size:1.3em}
    .match-item{padding:8px 10px;font-size:0.85em}
    .share-btn{padding:5px 8px;font-size:0.68em}
    #soundToggle{font-size:0.7em;padding:4px 8px}
    .lang-btn{width:26px;height:19px}
    .lang-btn img{width:20px;height:14px}
    .floating-home{width:38px;height:38px;font-size:1em;bottom:10px;left:10px}
}
    </style>
</head>

        tick(){if(soundEnabled)play(800,0.04,'square',0.08)},

/* ===== LADDER GENERATION ===== */
function generateLadder(){
    const n=playerCount;
    const margin=60;
    const topY=80;
    const botY=H-80;
    const usableW=W-margin*2;
    const gap=usableW/(n-1);

    // Verticals
    const verts=[];
    for(let i=0;i<n;i++)verts.push({x:margin+i*gap,topY,botY});

    // Horizontals
    const horizCount=complexity==='low'?Math.max(3,n*2):complexity==='high'?Math.max(8,n*5):Math.max(5,n*3);
    const minGapY=30;
    const horiz=[];
    const segments=[];// track segments per column-pair
    for(let i=0;i<n-1;i++)segments.push([]);

    for(let h=0;h<horizCount;h++){
        let attempts=0;
        while(attempts<50){
            const col=Math.floor(Math.random()*(n-1));
            const y=topY+minGapY+Math.random()*(botY-topY-minGapY*2);
            // Check no overlap
            const tooClose=segments[col].some(sy=>Math.abs(sy-y)<minGapY);
            if(!tooClose){
                segments[col].push(y);
                horiz.push({col,y,x1:verts[col].x,x2:verts[col+1].x});
                break;
            }
            attempts++;
        }
    }

    // Sort horizontals by y for consistent tracing
    horiz.sort((a,b)=>a.y-b.y);

    // Collect player names & results
    const nameInputs=document.querySelectorAll('#playerInputs input');
    const resultInputs=document.querySelectorAll('#resultInputs input');
    const names=[];const results=[];
    nameInputs.forEach((inp,i)=>names.push(inp.value.trim()||T('playerN',{n:i+1})));
    resultInputs.forEach((inp,i)=>results.push(inp.value.trim()||(inp.dataset.cleared?'':inp.placeholder)||''));

    ladder={verticals:verts,horizontals:horiz,names,results,n};
}

/* ===== TRACE PATH ===== */
function tracePath(startCol){
    const path=[];
    let col=startCol;
    let y=ladder.verticals[0].topY;
    path.push({x:ladder.verticals[col].x,y,type:'start'});

    // Get horizontals sorted by y
    const hs=[...ladder.horizontals].sort((a,b)=>a.y-b.y);

    for(const h of hs){
        if(h.y<=y)continue;
        if(h.col===col){
            // Go down to this horizontal, then right
            path.push({x:ladder.verticals[col].x,y:h.y,type:'down'});
            col=col+1;
            path.push({x:ladder.verticals[col].x,y:h.y,type:'turn'});
        }else if(h.col===col-1){
            // Go down to this horizontal, then left
            path.push({x:ladder.verticals[col].x,y:h.y,type:'down'});
            col=col-1;
            path.push({x:ladder.verticals[col].x,y:h.y,type:'turn'});
        }
        y=h.y;
    }

    // Go to bottom
    path.push({x:ladder.verticals[col].x,y:ladder.verticals[col].botY,type:'end'});
    return{path,endCol:col};
}

function drawLadder(){
    const{verticals:v,horizontals:h,names,results,n}=ladder;

    // Draw vertical lines with neon glow
    v.forEach((vert,i)=>{
        ctx.save();
        ctx.shadowColor=COLORS[i%COLORS.length];
        ctx.shadowBlur=8;
        ctx.strokeStyle=COLORS[i%COLORS.length];
        ctx.globalAlpha=0.4;
        ctx.lineWidth=3;
        ctx.beginPath();ctx.moveTo(vert.x,vert.topY);ctx.lineTo(vert.x,vert.botY);ctx.stroke();
        ctx.restore();

        // Brighter core line
        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,0.25)';
        ctx.lineWidth=1.5;
        ctx.beginPath();ctx.moveTo(vert.x,vert.topY);ctx.lineTo(vert.x,vert.botY);ctx.stroke();
        ctx.restore();
    });

    // Draw horizontal rungs
    h.forEach(rung=>{
        ctx.save();
        ctx.shadowColor='rgba(255,230,109,0.5)';
        ctx.shadowBlur=6;
        ctx.strokeStyle='rgba(255,230,109,0.35)';
        ctx.lineWidth=2.5;
        ctx.beginPath();ctx.moveTo(rung.x1,rung.y);ctx.lineTo(rung.x2,rung.y);ctx.stroke();
        ctx.restore();

        ctx.save();
        ctx.strokeStyle='rgba(255,255,255,0.2)';
        ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(rung.x1,rung.y);ctx.lineTo(rung.x2,rung.y);ctx.stroke();
        ctx.restore();
    });

    // Draw player names at top
    const fontSize=Math.min(14,W/(n*3));
    ctx.font=`bold ${fontSize}px 'Orbitron',sans-serif`;
    ctx.textAlign='center';
    v.forEach((vert,i)=>{
        // Circle
        ctx.save();
        ctx.shadowColor=COLORS[i%COLORS.length];
        ctx.shadowBlur=12;
        ctx.fillStyle=COLORS[i%COLORS.length];
        ctx.beginPath();ctx.arc(vert.x,vert.topY-22,14,0,Math.PI*2);ctx.fill();
        ctx.restore();

        // Number inside circle
        ctx.fillStyle='#fff';
        ctx.font=`bold 11px 'Orbitron',sans-serif`;
        ctx.fillText(i+1,vert.x,vert.topY-18);

        // Name below circle
        ctx.font=`bold ${fontSize}px 'Noto Sans KR',sans-serif`;
        ctx.fillStyle='#fff';
        ctx.fillText(names[i]||'',vert.x,vert.topY-42);
    });

    // Draw result slots at bottom (hidden until tracer arrives or game done)
    v.forEach((vert,i)=>{
        const revealed=tracers.some(t=>t.done&&t.endCol===i)||gamePhase==='done';
        ctx.save();
        ctx.fillStyle=revealed?'rgba(255,107,53,0.2)':'rgba(255,255,255,0.06)';
        ctx.strokeStyle=revealed?'rgba(255,107,53,0.5)':'rgba(255,255,255,0.1)';
        ctx.lineWidth=1.5;
        const bw=Math.min(80,W/(n*1.2));
        const bh=28;
        const rx=vert.x-bw/2;const ry=vert.botY+12;
        ctx.beginPath();
        ctx.roundRect?ctx.roundRect(rx,ry,bw,bh,8):(() => {ctx.moveTo(rx+8,ry);ctx.lineTo(rx+bw-8,ry);ctx.quadraticCurveTo(rx+bw,ry,rx+bw,ry+8);ctx.lineTo(rx+bw,ry+bh-8);ctx.quadraticCurveTo(rx+bw,ry+bh,rx+bw-8,ry+bh);ctx.lineTo(rx+8,ry+bh);ctx.quadraticCurveTo(rx,ry+bh,rx,ry+bh-8);ctx.lineTo(rx,ry+8);ctx.quadraticCurveTo(rx,ry,rx+8,ry)})();
        ctx.fill();ctx.stroke();
        ctx.restore();

        if(revealed){
            ctx.save();
            ctx.shadowColor='rgba(255,107,53,0.6)';
            ctx.shadowBlur=8;
            ctx.fillStyle='#fff';
            ctx.font=`bold ${Math.min(12,fontSize)}px 'Noto Sans KR',sans-serif`;
            ctx.textAlign='center';
            const txt=results[i]||'';
            ctx.fillText(txt,vert.x,ry+bh/2+4,bw-8);
            ctx.restore();
        }else{
            ctx.fillStyle='rgba(255,255,255,0.2)';
            ctx.font='bold 16px sans-serif';
            ctx.textAlign='center';
            ctx.fillText('?',vert.x,vert.botY+30);
        }
    });
}

/* ===== TRACERS (animated balls) ===== */
function createTracer(playerIdx){
    const pathData=tracePath(playerIdx);
    const color=COLORS[playerIdx%COLORS.length];
    // Calculate total path length
    let totalLen=0;const segs=[];
    for(let i=1;i<pathData.path.length;i++){
        const dx=pathData.path[i].x-pathData.path[i-1].x;
        const dy=pathData.path[i].y-pathData.path[i-1].y;
        const len=Math.sqrt(dx*dx+dy*dy);
        segs.push({from:pathData.path[i-1],to:pathData.path[i],len,type:pathData.path[i].type});
        totalLen+=len;
    }
    return{playerIdx,color,name:ladder.names[playerIdx],segs,totalLen,progress:0,speed:Math.max(200,totalLen/3),done:false,endCol:pathData.endCol,trail:[],x:pathData.path[0].x,y:pathData.path[0].y};
}

function updateTracer(t,dt){
    if(t.done)return;
    t.progress+=t.speed*dt;

    // Find current position
    let dist=0;
    for(const seg of t.segs){
        if(dist+seg.len>=t.progress){
            const frac=(t.progress-dist)/seg.len;
            t.x=seg.from.x+(seg.to.x-seg.from.x)*frac;
            t.y=seg.from.y+(seg.to.y-seg.from.y)*frac;

            // Sound on turn
            if(seg.type==='turn'&&frac<0.1&&!seg._sounded){
                seg._sounded=true;
                Audio.turn();
            }
            break;
        }
        dist+=seg.len;
    }

    // Tick sound periodically
    if(Math.floor(t.progress/30)!==Math.floor((t.progress-t.speed*dt)/30)){
        Audio.tick();
    }

    // Trail
    t.trail.push({x:t.x,y:t.y,alpha:1});
    if(t.trail.length>60)t.trail.shift();
    t.trail.forEach(p=>p.alpha*=0.96);

    // Particles
    if(Math.random()<0.3){
        particles.push({x:t.x,y:t.y,vx:(Math.random()-0.5)*30,vy:(Math.random()-0.5)*30,life:0.5,maxLife:0.5,color:t.color,size:Math.random()*3+1});
    }

    // Done?
    if(t.progress>=t.totalLen){
        t.done=true;
        t.x=t.segs[t.segs.length-1].to.x;
        t.y=t.segs[t.segs.length-1].to.y;
        arrivedCount++;
        matchResults.push({name:t.name,result:ladder.results[t.endCol],color:t.color,playerIdx:t.playerIdx,endCol:t.endCol});
        Audio.arrive();

        // Burst particles
        for(let i=0;i<20;i++){
            const ang=Math.random()*Math.PI*2;
            const spd=Math.random()*80+20;
            particles.push({x:t.x,y:t.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:0.8,maxLife:0.8,color:t.color,size:Math.random()*4+2});
        }

        if(arrivedCount>=ladder.n){
            setTimeout(()=>{gamePhase='done';showResultScreen()},800);
        }
    }
}

function drawTracers(){
    tracers.forEach(t=>{
        // Trail
        t.trail.forEach((p,i)=>{
            ctx.save();
            ctx.globalAlpha=p.alpha*0.4;
            ctx.shadowColor=t.color;
            ctx.shadowBlur=10;
            ctx.fillStyle=t.color;
            const s=3+i/t.trail.length*4;
            ctx.beginPath();ctx.arc(p.x,p.y,s,0,Math.PI*2);ctx.fill();
            ctx.restore();
        });

        // Main ball
        if(!t.done||Math.sin(performance.now()/200)>0){
            ctx.save();
            ctx.shadowColor=t.color;
            ctx.shadowBlur=20;
            ctx.fillStyle=t.color;
            ctx.beginPath();ctx.arc(t.x,t.y,8,0,Math.PI*2);ctx.fill();
            // White core
            ctx.shadowBlur=0;
            ctx.fillStyle='rgba(255,255,255,0.8)';
            ctx.beginPath();ctx.arc(t.x,t.y,3,0,Math.PI*2);ctx.fill();
            ctx.restore();
        }
    });
}

function drawParticles(dt){
    particles=particles.filter(p=>{
        p.life-=dt;if(p.life<=0)return false;
        p.x+=p.vx*dt;p.y+=p.vy*dt;
        p.vx*=0.95;p.vy*=0.95;
        ctx.save();
        ctx.globalAlpha=(p.life/p.maxLife)*0.6;
        ctx.shadowColor=p.color;
        ctx.shadowBlur=5;
        ctx.fillStyle=p.color;
        ctx.beginPath();ctx.arc(p.x,p.y,p.size*(p.life/p.maxLife),0,Math.PI*2);ctx.fill();
        ctx.restore();
        return true;
    });
}

/* ===== PROMPT TEXT ===== */
function drawPrompt(){
    if(promptAlpha<=0)return;
    ctx.save();
    ctx.globalAlpha=promptAlpha;
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='bold 16px "Noto Sans KR",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(promptText,W/2,H-30);
    ctx.restore();
}

/* ===== CLICK HANDLING ===== */
function handleCanvasClick(e){
    if(gamePhase!=='playing')return;
    Audio.getCtx();
    const rect=canvas.getBoundingClientRect();
    const cx=(e.clientX||e.touches?.[0]?.clientX||0)-rect.left;
    const cy=(e.clientY||e.touches?.[0]?.clientY||0)-rect.top;

    if(playMode==='all'){
        // Start all at once
        if(tracers.length===0){
            for(let i=0;i<ladder.n;i++)tracers.push(createTracer(i));
            promptAlpha=0;
        }
        return;
    }

    // One by one: find which player was clicked (top area)
    if(cy<ladder.verticals[0].topY+20){
        const v=ladder.verticals;
        let closest=-1,minDist=60;
        for(let i=0;i<v.length;i++){
            const d=Math.abs(cx-v[i].x);
            if(d<minDist&&!tracers.some(t=>t.playerIdx===i)){closest=i;minDist=d}
        }
        if(closest>=0){
            tracers.push(createTracer(closest));
            if(tracers.length>=ladder.n)promptAlpha=0;
        }
    }
}

/* ===== CONFETTI ===== */
let confetti=[];
function startConfetti(){
    confetti=[];
    for(let i=0;i<150;i++){
        confetti.push({
            x:Math.random()*W,y:Math.random()*-H,
            vx:(Math.random()-0.5)*3,vy:Math.random()*4+2,
            rot:Math.random()*360,rotV:(Math.random()-0.5)*10,
            w:Math.random()*8+4,h:Math.random()*4+2,
            color:COLORS[Math.floor(Math.random()*COLORS.length)],
            life:3+Math.random()*2
        });
    }
}
function updateConfetti(dt){
    confCtx.clearRect(0,0,W,H);
    confetti=confetti.filter(c=>{
        c.life-=dt;if(c.life<=0)return false;
        c.x+=c.vx;c.y+=c.vy;c.rot+=c.rotV;
        c.vy+=0.1;
        confCtx.save();
        confCtx.translate(c.x,c.y);
        confCtx.rotate(c.rot*Math.PI/180);
        confCtx.globalAlpha=Math.min(1,c.life);
        confCtx.fillStyle=c.color;
        confCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);
        confCtx.restore();
        return true;
    });
}

/* ===== GAME LOOP ===== */
let lastTime=0;
function gameLoop(ts){
    const dt=Math.min((ts-(lastTime||ts))/1000,0.05);
    lastTime=ts;

    ctx.clearRect(0,0,W,H);

    // Background gradient
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#0A0A1A');bg.addColorStop(0.5,'#12122A');bg.addColorStop(1,'#0A0A1A');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    drawLadder();

    if(gamePhase==='playing'){
        tracers.forEach(t=>updateTracer(t,dt));
        drawTracers();
        drawParticles(dt);
        if(promptAlpha>0)promptAlpha-=dt*0.3;
        drawPrompt();
    }

    if(confetti.length)updateConfetti(dt);

    if(gamePhase!=='done')animId=requestAnimationFrame(gameLoop);
}

/* ===== START GAME ===== */
function startGame(){
    Audio.getCtx();
    gamePhase='playing';
    tracers=[];particles=[];arrivedCount=0;matchResults=[];confetti=[];

    document.getElementById('setupWrap').style.display='none';
    document.getElementById('gameWrap').style.display='block';
    document.getElementById('resultScreen').style.display='none';
    document.getElementById('soundToggle').style.display='block';

    resizeCanvas();
    generateLadder();

    promptText=playMode==='all'?T('tapAll'):T('tapToStart');
    promptAlpha=1;

    lastTime=0;
    animId=requestAnimationFrame(gameLoop);
}

/* ===== RESULT SCREEN ===== */
function showResultScreen(){
    cancelAnimationFrame(animId);
    Audio.fanfare();
    startConfetti();

    // Keep drawing confetti
    function confLoop(ts){
        const dt=Math.min((ts-(lastTime||ts))/1000,0.05);
        lastTime=ts;
        if(confetti.length){updateConfetti(dt);requestAnimationFrame(confLoop)}
    }
    lastTime=0;requestAnimationFrame(confLoop);

    document.getElementById('gameWrap').style.display='none';
    document.getElementById('resultScreen').style.display='flex';

    // Sort by playerIdx
    matchResults.sort((a,b)=>a.playerIdx-b.playerIdx);

    const ml=document.getElementById('matchList');
    ml.innerHTML=matchResults.map(m=>`
        <div class="match-item">
            <span class="match-dot" style="background:${m.color}"></span>
            <span class="match-name">${m.name}</span>
            <span class="match-arrow">→</span>
            <span class="match-result">${m.result}</span>
        </div>
    `).join('');

    buildShareButtons();
}

/* ===== SHARE ===== */
function buildShareButtons(){
    const text=matchResults.map(m=>`${m.name} → ${m.result}`).join('\n');
    const title='NotMePlz Ladder Game 🪜';
    const url='https://notmeplz.com/games/ladder/';
    const full=`${title}\n${text}\n${url}`;
    const enc=encodeURIComponent(full);
    const encUrl=encodeURIComponent(url);

    let html=`
        <button class="share-btn kakao" onclick="shareKakao()">💬 Kakao</button>
        <button class="share-btn line" onclick="window.open('https://social-plugins.line.me/lineit/share?url=${encUrl}&text=${enc}')">💚 LINE</button>
        <button class="share-btn whatsapp" onclick="window.open('https://wa.me/?text=${enc}')">💬 WhatsApp</button>
        <button class="share-btn telegram" onclick="window.open('https://t.me/share/url?url=${encUrl}&text=${enc}')">✈️ Telegram</button>
        <button class="share-btn twitter" onclick="window.open('https://twitter.com/intent/tweet?text=${enc}')">🐦 X</button>
        <button class="share-btn facebook" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${encUrl}')">👍 Facebook</button>
        <button class="share-btn copy-link" onclick="copyLink()">🔗 Copy</button>
    `;
    if(navigator.share){
        html+=`<button class="share-btn native-share" style="display:flex" onclick="nativeShare()">📤 Share</button>`;
    }
    document.getElementById('shareButtons').innerHTML=html;
}
function copyLink(){
    const text=matchResults.map(m=>`${m.name} → ${m.result}`).join('\n');
    navigator.clipboard.writeText(`NotMePlz Ladder 🪜\n${text}\nhttps://notmeplz.com/games/ladder/`).then(()=>{
        const t=document.getElementById('shareToast');t.textContent=T('copied');t.style.display='block';setTimeout(()=>t.style.display='none',2000);
    });
}
function nativeShare(){
    const text=matchResults.map(m=>`${m.name} → ${m.result}`).join('\n');
    navigator.share({title:'NotMePlz Ladder 🪜',text:text,url:'https://notmeplz.com/games/ladder/'}).catch(()=>{});
}
function shareKakao(){copyLink();}

/* ===== INIT ===== */
function init(){
    // Detect language
    const saved=localStorage.getItem('gloryCarRacing_lang');
    if(saved&&I18N[saved])lang=saved;
    else{
        const langMap={'ko':'ko','en':'en','es':'es','de':'de','fr':'fr','ja':'ja','zh':'zh','pt':'pt','ru':'ru','ar':'ar','hi':'hi','th':'th','id':'id','vi':'vi','tr':'tr'};
        const langs=navigator.languages||[navigator.language||'en'];
        for(const loc of langs){
            if(loc.toLowerCase()==='en-gb'){lang='gb';break}
            const p=loc.split('-')[0].toLowerCase();
            if(langMap[p]){lang=langMap[p];break}
        }
    }

    createStars();
    initCanvas();
    applyLanguage();

    // Lang bar
    document.getElementById('langBar').addEventListener('click',e=>{
        const btn=e.target.closest('.lang-btn');
        if(!btn)return;
        lang=btn.dataset.lang;
        localStorage.setItem('gloryCarRacing_lang',lang);
        applyLanguage();
    });

    // Complexity
    document.getElementById('complexityCards').addEventListener('click',e=>{
        const card=e.target.closest('.complexity-card');
        if(!card)return;
        document.querySelectorAll('.complexity-card').forEach(c=>c.classList.remove('selected'));
        card.classList.add('selected');
        complexity=card.dataset.val;
        Audio.click();
    });

    // Mode
    document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
        document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        playMode=b.dataset.mode;
        Audio.click();
    }));

    // Start
    document.getElementById('startBtn').addEventListener('click',startGame);

    // Replay
    document.getElementById('replayBtn').addEventListener('click',()=>{
        gamePhase='setup';confetti=[];
        confCtx.clearRect(0,0,W,H);
        document.getElementById('resultScreen').style.display='none';
        document.getElementById('setupWrap').style.display='flex';
        document.getElementById('gameWrap').style.display='none';
        document.getElementById('soundToggle').style.display='none';
    });

    // Canvas click/touch
    canvas=document.getElementById('gameCanvas');
    canvas.addEventListener('click',handleCanvasClick);
    canvas.addEventListener('touchstart',e=>{e.preventDefault();handleCanvasClick(e)},{passive:false});

    // Sound toggle
    document.getElementById('soundToggle').addEventListener('click',()=>{
        soundEnabled=!soundEnabled;
        document.getElementById('soundToggle').textContent=soundEnabled?T('soundOn'):T('soundOff');
    });

    // Resize
    window.addEventListener('resize',()=>{
        if(gamePhase==='playing'){
            resizeCanvas();
            generateLadder();
            // Regenerate tracers if they haven't started
            if(tracers.length===0){/* fine */}
        }
    });
}

init();
</script>
