*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;color:#fff;-webkit-tap-highlight-color:transparent}

#dynamicBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse at 50% 30%,rgba(255,230,109,0.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 70%,rgba(0,217,255,0.06) 0%,transparent 50%),linear-gradient(180deg,#0A0A1A 0%,#12122A 50%,#0A0A1A 100%)}
.stars{position:fixed;width:100%;height:100%;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}

/* Setup */
#setupWrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;justify-content:center;align-items:flex-start;padding:10px;overflow-y:auto}
#setupScreen{background:linear-gradient(145deg,rgba(20,20,40,.95),rgba(10,10,30,.98));backdrop-filter:blur(30px);border-radius:24px;padding:24px 28px;text-align:center;border:2px solid rgba(255,230,109,.2);box-shadow:0 25px 80px rgba(0,0,0,.7);max-width:600px;width:98vw;margin:20px auto}
#setupScreen::-webkit-scrollbar{width:6px}
#setupScreen::-webkit-scrollbar-thumb{background:var(--accent);border-radius:3px}
#setupScreen h1{font-family:'Orbitron',sans-serif;font-size:1.7em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--primary),var(--danger));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#setupScreen h2{font-family:'Orbitron',sans-serif;color:rgba(255,255,255,.4);font-size:.7em;margin-bottom:16px;letter-spacing:3px}

.lang-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:14px}
.lang-label{font-family:'Orbitron',sans-serif;font-size:.55em;color:rgba(255,255,255,.4);letter-spacing:2px}
.lang-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:340px}
.lang-btn{width:30px;height:22px;border:2px solid rgba(255,255,255,.12);border-radius:5px;background:rgba(255,255,255,.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s;padding:0;overflow:hidden}
.lang-btn img{width:22px;height:16px;object-fit:cover;border-radius:2px}
.lang-btn:hover{border-color:var(--accent);transform:scale(1.1)}
.lang-btn.active{border-color:var(--accent);background:rgba(255,230,109,.15)}

.section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-family:'Orbitron',sans-serif;font-size:.8em;color:var(--accent);letter-spacing:2px;margin-bottom:10px}

/* Lotto number options */
.num-opt{display:flex;gap:10px;align-items:center;margin:8px 0;flex-wrap:wrap;justify-content:center}
.num-opt label{font-size:.8em;color:rgba(255,255,255,.5)}
.num-opt input[type="number"]{width:70px;padding:7px 10px;border:2px solid rgba(255,255,255,.1);border-radius:12px;background:rgba(255,255,255,.08);color:#fff;font-size:.9em;outline:none;text-align:center;font-family:'Orbitron',sans-serif}
.num-opt input:focus{border-color:var(--accent)}

.opt-row{display:flex;gap:8px;align-items:center;justify-content:center;margin:8px 0;flex-wrap:wrap}
.opt-chip{padding:7px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);cursor:pointer;transition:all .3s;font-size:.8em;font-weight:700}
.opt-chip:hover{border-color:rgba(255,230,109,.3)}
.opt-chip.selected{border-color:var(--accent);background:rgba(255,230,109,.1)}

.btn-group{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 18px;font-size:.85em;font-weight:700;color:#fff;border:none;border-radius:20px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px)}
.floating-home{position:fixed;bottom:14px;left:14px;z-index:1000;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.5);border:2px solid rgba(255,107,53,0.4);color:#fff;font-size:1.2em;display:flex;align-items:center;justify-content:center;text-decoration:none;backdrop-filter:blur(10px);transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.floating-home:hover{background:rgba(255,107,53,0.3);border-color:var(--primary);transform:scale(1.1)}
#startBtn{padding:14px 36px;font-size:1.1em;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--primary));color:#000;box-shadow:0 12px 35px rgba(255,230,109,.3);animation:startP 2s ease-in-out infinite}
@keyframes startP{0%,100%{box-shadow:0 12px 35px rgba(255,230,109,.3)}50%{box-shadow:0 16px 45px rgba(255,230,109,.5)}}

/* Game screen */
#gameScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:linear-gradient(180deg,#080818 0%,#101028 50%,#080818 100%)}
#gameCanvas{display:block;width:100%;height:100%}

/* Result screen */
#resultScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;justify-content:center;align-items:center;background:rgba(5,5,15,.92);backdrop-filter:blur(10px);padding:20px;overflow-y:auto}
.result-card{background:linear-gradient(145deg,rgba(15,15,35,.98),rgba(25,25,55,.98));border-radius:24px;padding:28px;text-align:center;border:2px solid var(--accent);box-shadow:0 0 80px rgba(255,230,109,.2);width:560px;max-width:96vw;max-height:90vh;overflow-y:auto}
.result-card h1{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}

/* Lotto result */
.drawn-balls{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}
.drawn-ball{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:1.1em;font-weight:900;color:#fff;position:relative;box-shadow:0 4px 15px rgba(0,0,0,.4)}
.drawn-ball::before{content:'';position:absolute;top:6px;left:10px;width:18px;height:10px;border-radius:50%;background:rgba(255,255,255,.35);transform:rotate(-30deg)}

.share-panel{margin-top:16px}
.share-panel h3{font-family:'Orbitron',sans-serif;font-size:.75em;color:var(--secondary);margin-bottom:8px;letter-spacing:2px}
.share-buttons{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.share-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border:none;border-radius:16px;font-size:.75em;font-weight:700;color:#fff;cursor:pointer;transition:all .3s}
.share-btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.share-btn.kakao{background:#FEE500;color:#3C1E1E}.share-btn.line{background:#06C755}.share-btn.whatsapp{background:#25D366}.share-btn.telegram{background:#0088CC}.share-btn.twitter{background:#1DA1F2}.share-btn.facebook{background:#1877F2}.share-btn.copy-link{background:linear-gradient(135deg,#667,#445)}.share-btn.native-share{background:linear-gradient(135deg,var(--primary),var(--accent));display:none}
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--success);color:#000;padding:10px 24px;border-radius:20px;font-weight:700;z-index:400;display:none}

.result-btns{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.result-btns .btn{padding:10px 20px}
.btn-replay{background:linear-gradient(135deg,var(--accent),var(--primary));color:#000}
#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:350}

@media(max-width:500px){
    #setupScreen{padding:16px 12px}
    #setupScreen h1{font-size:1.2em}
    .result-card{padding:18px 12px}
    .drawn-ball{width:46px;height:46px;font-size:.9em}
    .lang-btn{width:26px;height:19px}.lang-btn img{width:20px;height:14px}
    .floating-home{width:38px;height:38px;font-size:1em;bottom:10px;left:10px}
}
    </style>
</head>

function renderLottoPresets(){
    const row=document.getElementById('lottoPresetRow');
    // Find which preset matches current language
    const defaultPreset=LOTTO_PRESETS.find(p=>p.langs.includes(lang))||LOTTO_PRESETS[0];
    // Sort: matching language first, then rest
    const sorted=[defaultPreset,...LOTTO_PRESETS.filter(p=>p!==defaultPreset)];

    row.innerHTML=sorted.map(p=>{
        const sel=p===defaultPreset?'selected':'';
        return `<div class="opt-chip ${sel}" data-preset="${p.id}" style="font-size:.72em;padding:5px 10px">${p.flag} ${p.name}<span style="color:rgba(255,255,255,.35);margin-left:4px;font-size:.85em">${p.start}-${p.end}/${p.draw}</span></div>`;
    }).join('');

    // Apply default preset values
    applyLottoPreset(defaultPreset);

    // Click handler
    row.querySelectorAll('.opt-chip').forEach(chip=>{
        chip.addEventListener('click',()=>{
            row.querySelectorAll('.opt-chip').forEach(c=>c.classList.remove('selected'));
            chip.classList.add('selected');
            const preset=LOTTO_PRESETS.find(p=>p.id===chip.dataset.preset);
            if(preset)applyLottoPreset(preset);
            SFX.click();
        });
    });
}

function applyLottoPreset(preset){
    activePreset=preset;
    document.getElementById('numStart').value=preset.start;
    document.getElementById('numEnd').value=preset.end;
    document.getElementById('drawCount').value=preset.draw;
    const bs=document.getElementById('bonusSection');
    if(preset.bonus){
        bs.style.display='block';
        document.getElementById('bonusStart').value=preset.bonus.start;
        document.getElementById('bonusEnd').value=preset.bonus.end;
        document.getElementById('bonusCount').value=preset.bonus.draw;
        document.getElementById('bonusLabel').textContent='⭐ '+(preset.bonus.label||'Bonus Ball');

        bs.style.display='none';
    }
}

/* ============================================
   CANVAS PHYSICS - LOTTO MACHINE
============================================ */
let canvas,ctx,dpr,W,H,animId;
let balls=[],drawnBalls=[],drawing=false,drawQueue=[],currentDrawn=0;

// Ball physics
const GRAVITY=220,BOUNCE=.8,FRICTION=.993,BALL_R=15;
// Machine dimensions (computed on resize)
let machineX,machineY,machineR,exitX,exitY,exitR;

function initCanvas(){
    canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
    dpr=window.devicePixelRatio||1;resizeCanvas();
}

function resizeCanvas(){
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    machineR=Math.min(W*.42,H*.33,220);
    machineX=W/2;machineY=H*.35;
    // Gate at bottom center of globe
    exitX=machineX;exitY=machineY+machineR+BALL_R+8;exitR=BALL_R+4;
    // Tray position (wooden rack below gate)
    trayY=exitY+BALL_R+30;
    trayStartX=W/2;
}
let trayY=0,trayStartX=0,gateOpen=false,gateAnim=0;

function createBalls(labels,colors){
    balls=[];
    const n=labels.length;
    for(let i=0;i<n;i++){
        const angle=Math.random()*Math.PI*2;
        const dist=Math.random()*machineR*.75;
        balls.push({
            x:machineX+Math.cos(angle)*dist,
            y:machineY+Math.sin(angle)*dist,
            vx:(Math.random()-.5)*200,
            vy:(Math.random()-.5)*200,
            z:Math.random()*2-1,// -1 to 1: depth (front to back)
            vz:(Math.random()-.5)*3,// z velocity
            r:BALL_R,
            label:labels[i],
            color:colors[i%colors.length],
            drawn:false,
            exitAnim:0
        });
    }
}

function updateBalls(dt){
    const t=performance.now()*.001;

    /* ============================================
       REAL LOTTO MACHINE PHYSICS
       - Air jets blast upward from bottom at random intervals
       - Balls collide chaotically, no uniform rotation
       - Intermittent bursts scatter balls everywhere
       - Balls rise, fall, bounce off walls and each other
    ============================================ */

    // Intermittent air bursts (every ~2-4 seconds, random direction)
    const burstCycle=Math.floor(t/2.5);
    const burstPhase=(t%2.5)/2.5;// 0-1 within each burst cycle
    const burstActive=burstPhase<0.4;// burst for 40% of cycle
    const burstAngle=burstCycle*7.31;// pseudo-random angle per burst
    const burstStr=burstActive?180+Math.sin(burstCycle*3.7)*60:0;

    for(const b of balls){
        if(b.drawn)continue;

        const bx=b.x-machineX,by=b.y-machineY;
        const bDist=Math.sqrt(bx*bx+by*by);
        const normR=bDist/machineR;

        // 1) Gravity
        b.vy+=GRAVITY*dt;

        // 2) Strong bottom air jets — balls shoot upward
        const vertPos=(b.y-machineY)/machineR;
        const liftStr=Math.max(0,vertPos+0.1)*400;// MUCH stronger lift
        b.vy-=liftStr*dt;
        // Random sideways from blower
        b.vx+=Math.sin(t*4+b.label*2)*liftStr*0.4*dt;

        // 3) Powerful intermittent bursts — scatter balls everywhere
        if(burstActive){
            const bSeed=b.label*3.17+burstCycle*5.13;
            const bAngle=burstAngle+Math.sin(bSeed)*2.0;
            const bStr=burstStr*(0.8+Math.random()*0.4);
            b.vx+=Math.cos(bAngle)*bStr*dt;
            b.vy+=Math.sin(bAngle)*bStr*dt*0.6-bStr*dt*0.7;
        }

        // 4) Per-ball chaotic turbulence — every ball moves differently
        const seed=b.label*7.13;
        b.vx+=Math.sin(t*4.1+seed)*60*dt;
        b.vy+=Math.cos(t*3.7+seed*1.4)*50*dt;
        // Random strong kicks
        if(Math.sin(t*7+seed*2)>0.9){
            b.vx+=(Math.random()-0.5)*400*dt;
            b.vy+=(Math.random()-0.5)*350*dt;
        }

        // 5) Z-axis (depth) — balls constantly shuffle front/back
        //    Collisions and turbulence push balls between layers
        b.vz+=(Math.sin(t*3.5+seed*0.7))*6*dt;// oscillate
        b.vz+=(Math.random()-.5)*8*dt;// random z kicks
        // Bursts also affect z
        if(burstActive)b.vz+=(Math.sin(burstCycle*2.1+seed))*10*dt;
        b.vz*=0.94;// z friction
        b.z+=b.vz*dt;
        if(b.z>1){b.z=1;b.vz*=-0.7}
        if(b.z<-1){b.z=-1;b.vz*=-0.7}

        // 6) Anti-wall-hugging
        if(normR>0.65){
            const pushInward=(normR-0.65)*250;
            b.vx-=(bx/bDist)*pushInward*dt;
            b.vy-=(by/bDist)*pushInward*dt;
        }

        b.vx*=FRICTION;b.vy*=FRICTION;

        // Speed limit — higher for more dynamic movement
        const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
        if(spd>500){b.vx*=500/spd;b.vy*=500/spd}

        b.x+=b.vx*dt;b.y+=b.vy*dt;

        // Constrain to machine circle
        const dx=b.x-machineX,dy=b.y-machineY;
        const dist=Math.sqrt(dx*dx+dy*dy);
        const maxDist=machineR-b.r;
        if(dist>maxDist){
            const nx=dx/dist,ny=dy/dist;
            b.x=machineX+nx*maxDist;b.y=machineY+ny*maxDist;
            // Reflect velocity
            const dot=b.vx*nx+b.vy*ny;
            b.vx-=2*dot*nx*BOUNCE;b.vy-=2*dot*ny*BOUNCE;
            if(Math.abs(dot)>50)SFX.bounce();
        }

        // Ball-ball collision
        for(const o of balls){
            if(o===b||o.drawn)continue;
            const bx=b.x-o.x,by=b.y-o.y;
            const bd=Math.sqrt(bx*bx+by*by);
            const minD=b.r+o.r;
            if(bd<minD&&bd>0){
                const nx=bx/bd,ny=by/bd;
                const overlap=(minD-bd)/2;
                b.x+=nx*overlap;b.y+=ny*overlap;
                o.x-=nx*overlap;o.y-=ny*overlap;
                const dvx=b.vx-o.vx,dvy=b.vy-o.vy;
                const dvn=dvx*nx+dvy*ny;
                if(dvn>0){
                    b.vx-=dvn*nx*.8;b.vy-=dvn*ny*.8;
                    o.vx+=dvn*nx*.8;o.vy+=dvn*ny*.8;
                }
            }
        }
    }
}

function drawBall(x,y,r,color,label,highlight=false){
    ctx.save();
    // Shadow
    ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=8;ctx.shadowOffsetY=3;

    // Main sphere gradient
    const g=ctx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,.35)');
    g.addColorStop(.3,color);
    g.addColorStop(.8,color);
    g.addColorStop(1,darkenColor(color,.3));
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

    // Glossy highlight
    ctx.shadowColor='transparent';
    const hl=ctx.createRadialGradient(x-r*.25,y-r*.3,0,x-r*.25,y-r*.3,r*.6);
    hl.addColorStop(0,'rgba(255,255,255,.5)');
    hl.addColorStop(.5,'rgba(255,255,255,.15)');
    hl.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=hl;ctx.fill();

    // Number circle - adapt to ball color brightness
    if(label!==undefined){
        const cr=r*.55;
        const isLight=isLightColor(color);
        ctx.beginPath();ctx.arc(x,y+r*.05,cr,0,Math.PI*2);
        ctx.fillStyle=isLight?'rgba(0,0,0,.12)':'rgba(255,255,255,.9)';ctx.fill();
        // Number text
        const fs=Math.min(r*.7,cr*1.2);
        ctx.font=`900 ${fs}px 'Orbitron',sans-serif`;
        ctx.fillStyle=isLight?'#333':'#222';ctx.textAlign='center';ctx.textBaseline='middle';
        const txt=String(label);
        ctx.fillText(txt,x,y+r*.08,cr*1.8);
    }

    if(highlight){
        ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=3;
        ctx.beginPath();ctx.arc(x,y,r+2,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
}

function darkenColor(hex,amt){
    let r,g,b;
    if(hex.startsWith('#')){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16)}
    else if(hex.startsWith('rgb')){const m=hex.match(/\d+/g);r=+m[0];g=+m[1];b=+m[2]}
    else{return hex}
    return `rgb(${Math.max(0,Math.floor(r*(1-amt)))},${Math.max(0,Math.floor(g*(1-amt)))},${Math.max(0,Math.floor(b*(1-amt)))})`;
}
function isLightColor(hex){
    let r,g,b;
    if(hex.startsWith('#')){r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16)}
    else if(hex.startsWith('rgb')){const m=hex.match(/\d+/g);r=+m[0];g=+m[1];b=+m[2]}
    else{return false}
    return(r*299+g*587+b*114)/1000>180;
}

function drawMachine(){
    const mx=machineX,my=machineY,mr=machineR;

    // === STAND / PEDESTAL ===
    ctx.save();
    const poleW=16;
    const poleTop=my+mr+5;const poleBot=trayY+10;
    const poleGrad=ctx.createLinearGradient(mx-poleW,0,mx+poleW,0);
    poleGrad.addColorStop(0,'#555');poleGrad.addColorStop(.3,'#999');poleGrad.addColorStop(.5,'#aaa');poleGrad.addColorStop(.7,'#999');poleGrad.addColorStop(1,'#555');
    ctx.fillStyle=poleGrad;
    ctx.fillRect(mx-poleW/2,poleTop,poleW,poleBot-poleTop);
    ctx.restore();

    // === GLASS GLOBE (behind balls) ===
    ctx.save();
    ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);
    const glassFill=ctx.createRadialGradient(mx,my,mr*.2,mx,my,mr);
    glassFill.addColorStop(0,'rgba(200,220,255,.03)');
    glassFill.addColorStop(.7,'rgba(150,200,255,.02)');
    glassFill.addColorStop(1,'rgba(100,150,200,.04)');
    ctx.fillStyle=glassFill;ctx.fill();
    ctx.restore();

    // === METAL RIM (gold ring around globe) ===
    ctx.save();
    ctx.beginPath();ctx.arc(mx,my,mr+5,0,Math.PI*2);
    const rimGrad=ctx.createLinearGradient(mx-mr,my-mr,mx+mr,my+mr);
    rimGrad.addColorStop(0,'#8B7320');rimGrad.addColorStop(.2,'#D4AF37');rimGrad.addColorStop(.4,'#FFD700');rimGrad.addColorStop(.5,'#FFF8DC');rimGrad.addColorStop(.6,'#FFD700');rimGrad.addColorStop(.8,'#D4AF37');rimGrad.addColorStop(1,'#8B7320');
    ctx.strokeStyle=rimGrad;ctx.lineWidth=6;ctx.stroke();
    ctx.beginPath();ctx.arc(mx,my,mr+1,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();

    // === GATE MECHANISM (bottom center) ===
    const gateW=BALL_R*2+8;
    const gateH=12;
    const gateY=my+mr-2;
    ctx.save();
    ctx.fillStyle='#333';
    ctx.strokeStyle='#666';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(mx-gateW*.8,gateY);
    ctx.lineTo(mx-gateW*.5,gateY+gateH);
    ctx.lineTo(mx-gateW*.5,gateY+gateH+BALL_R*2+4);
    ctx.lineTo(mx+gateW*.5,gateY+gateH+BALL_R*2+4);
    ctx.lineTo(mx+gateW*.5,gateY+gateH);
    ctx.lineTo(mx+gateW*.8,gateY);
    ctx.closePath();ctx.fill();ctx.stroke();

    if(gateOpen){
        gateAnim=Math.min(1,gateAnim+.05);
    }else{
        gateAnim=Math.max(0,gateAnim-.08);
    }
    const doorOffset=gateW*.45*gateAnim;
    ctx.fillStyle='#c0392b';
    ctx.fillRect(mx-gateW*.45,gateY+gateH-2,gateW*.45-doorOffset,6);
    ctx.fillRect(mx+doorOffset,gateY+gateH-2,gateW*.45-doorOffset,6);
    if(gateAnim<.5){
        ctx.fillStyle='#e74c3c';
        ctx.beginPath();ctx.arc(mx-gateW*.25,gateY+gateH+1,2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(mx+gateW*.25,gateY+gateH+1,2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
}

function drawGlassOverlay(){
    const mx=machineX,my=machineY,mr=machineR;
    ctx.save();
    ctx.beginPath();
    ctx.arc(mx,my,mr-2,Math.PI*1.15,Math.PI*1.85);
    const ref=ctx.createLinearGradient(mx-mr*.6,my-mr*.6,mx+mr*.2,my+mr*.2);
    ref.addColorStop(0,'rgba(255,255,255,.12)');ref.addColorStop(.5,'rgba(255,255,255,.04)');ref.addColorStop(1,'rgba(255,255,255,0)');
    ctx.strokeStyle=ref;ctx.lineWidth=mr*.15;ctx.stroke();

    ctx.beginPath();ctx.ellipse(mx-mr*.35,my-mr*.4,mr*.15,mr*.08,-0.5,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.15)';ctx.fill();

    ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);
    ctx.strokeStyle='rgba(200,230,255,.1)';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
}

function drawSingleTray(tx,ty,slots){
    const gap=BALL_R*2.4;
    const trayW=Math.max(slots,1)*gap+20;
    const trayH=BALL_R*2+14;

    ctx.save();
    const woodGrad=ctx.createLinearGradient(tx,ty,tx,ty+trayH);
    woodGrad.addColorStop(0,'#8B5E3C');woodGrad.addColorStop(.3,'#A0704F');woodGrad.addColorStop(.5,'#8B5E3C');woodGrad.addColorStop(.8,'#6B3F23');woodGrad.addColorStop(1,'#5A3420');
    ctx.fillStyle=woodGrad;

    ctx.beginPath();
    ctx.moveTo(tx+6,ty);ctx.lineTo(tx+trayW-6,ty);
    ctx.quadraticCurveTo(tx+trayW,ty,tx+trayW,ty+6);
    ctx.lineTo(tx+trayW,ty+trayH-6);
    ctx.quadraticCurveTo(tx+trayW,ty+trayH,tx+trayW-6,ty+trayH);
    ctx.lineTo(tx+6,ty+trayH);
    ctx.quadraticCurveTo(tx,ty+trayH,tx,ty+trayH-6);
    ctx.lineTo(tx,ty+6);
    ctx.quadraticCurveTo(tx,ty,tx+6,ty);
    ctx.closePath();ctx.fill();

    // Grain
    ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=.5;
    for(let i=0;i<5;i++){ctx.beginPath();ctx.moveTo(tx+6,ty+3+i*(trayH/5));ctx.lineTo(tx+trayW-6,ty+3+i*(trayH/5));ctx.stroke()}

    // Inner shadow
    const ig=ctx.createLinearGradient(tx,ty,tx,ty+8);
    ig.addColorStop(0,'rgba(0,0,0,.2)');ig.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ig;ctx.fillRect(tx+3,ty+2,trayW-6,8);

    // Border
    ctx.strokeStyle='#4A2A15';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(tx+6,ty);ctx.lineTo(tx+trayW-6,ty);ctx.quadraticCurveTo(tx+trayW,ty,tx+trayW,ty+6);ctx.lineTo(tx+trayW,ty+trayH-6);ctx.quadraticCurveTo(tx+trayW,ty+trayH,tx+trayW-6,ty+trayH);ctx.lineTo(tx+6,ty+trayH);ctx.quadraticCurveTo(tx,ty+trayH,tx,ty+trayH-6);ctx.lineTo(tx,ty+6);ctx.quadraticCurveTo(tx,ty,tx+6,ty);
    ctx.closePath();ctx.stroke();

    // Dividers
    ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=1;
    for(let i=1;i<slots;i++){const sx=tx+10+i*gap;ctx.beginPath();ctx.moveTo(sx,ty+3);ctx.lineTo(sx,ty+trayH-3);ctx.stroke()}

    ctx.restore();
    return{tx:tx+10,gap};
}

function drawWoodenTray(){
    // Single tray for lotto mode
    const total=drawQueue?drawQueue.length:6;
    const gap=BALL_R*2.4;
    const trayW=total*gap+20;
    const tx=machineX-trayW/2;
    const ty=trayY-BALL_R-4;
    drawSingleTray(tx,ty,total);
}

function drawDrawnBalls(){
    // Lotto mode: single tray
    const total=drawQueue?drawQueue.length:6;
    const gap=BALL_R*2.4;
    const trayW=total*gap+20;
    const tx=machineX-trayW/2+10;

    drawnBalls.forEach((b,i)=>{
        const targetX=tx+i*gap+gap/2;
        const targetY=trayY;

        if(b.exitAnim<1){
            b.exitAnim=Math.min(1,b.exitAnim+.018);
            const t=b.exitAnim;
            if(t<.4){
                const p=t/.4;b.dispX=exitX;b.dispY=exitY+(trayY-exitY)*p*p;
            }else{
                const p=(t-.4)/.6;const ease=1-Math.pow(1-p,2);
                b.dispX=exitX+(targetX-exitX)*ease;b.dispY=trayY-Math.sin(p*Math.PI)*8;
            }
        }else{b.dispX=targetX;b.dispY=targetY}
        drawBall(b.dispX,b.dispY,BALL_R+1,b.color,b.label,true);
    });
}

/* Draw sequence */
/* Main loop */
let lastTime=0;
function loop(ts){
    const dt=Math.min((ts-(lastTime||ts))/1000,.033);
    lastTime=ts;
    ctx.clearRect(0,0,W,H);

    // Background
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#080818');bg.addColorStop(.5,'#101028');bg.addColorStop(1,'#080818');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);

    drawMachine();
    updateBalls(dt);

    // Draw balls in machine (clip to globe)
    // Sort by z: back balls drawn first, front balls drawn LAST (on top = overlap)
    ctx.save();
    ctx.beginPath();ctx.arc(machineX,machineY,machineR-2,0,Math.PI*2);ctx.clip();
    const sortedBalls=[...balls].filter(b=>!b.drawn).sort((a,b)=>(a.z||0)-(b.z||0));
    for(const b of sortedBalls){
        const z=b.z||0;// -1=back, 1=front
        // Size: very subtle difference (0.92 to 1.0) — globe isn't deep
        const scale=0.92+0.08*(z+1)/2;
        // Brightness: back balls slightly darker (shadow of other balls)
        const dimFactor=0.7+0.3*(z+1)/2;// 0.7=back, 1.0=front
        ctx.save();
        ctx.globalAlpha=dimFactor;
        drawBall(b.x,b.y,b.r*scale,b.color,b.label);
        ctx.restore();
    }
    ctx.restore();

    // Glass overlay on top
    drawGlassOverlay();

    // Wooden tray
    drawWoodenTray();

    // Drawn balls in tray
    drawDrawnBalls();

    // Status text
    if(drawing){
        ctx.fillStyle='rgba(255,230,109,.8)';ctx.font='bold 14px "Noto Sans KR",sans-serif';
        ctx.textAlign='center';ctx.fillText(T('drawing'),W/2,H-30);
    }else if(drawnBalls.length>0){
        ctx.fillStyle='rgba(0,255,136,.8)';ctx.font='bold 14px "Noto Sans KR",sans-serif';
        ctx.textAlign='center';ctx.fillText(T('complete'),W/2,H-30);
    }

    animId=requestAnimationFrame(loop);
}

let bonusConfig=null;// {start,end,draw,label} or null

function startLottoDraw(){
    const start=parseInt(document.getElementById('numStart').value)||1;
    const end=parseInt(document.getElementById('numEnd').value)||45;
    const count=parseInt(document.getElementById('drawCount').value)||6;
    const range=Math.max(end,start)-Math.min(end,start)+1;
    const lo=Math.min(start,end);

    // Check for bonus balls
    const bs=document.getElementById('bonusSection');
    if(bs.style.display!=='none'){
        const bStart=parseInt(document.getElementById('bonusStart').value)||1;
        const bEnd=parseInt(document.getElementById('bonusEnd').value)||26;
        const bCount=parseInt(document.getElementById('bonusCount').value)||1;
        bonusConfig={start:Math.min(bStart,bEnd),end:Math.max(bStart,bEnd),draw:bCount,label:document.getElementById('bonusLabel').textContent.replace('⭐ ','')};
    }else{
        bonusConfig=null;
    }

    // Main pool balls - use preset color function if available
    const colorFn=activePreset?.mainColorFn||genericColor;
    const allNums=[];for(let i=0;i<range;i++)allNums.push(lo+i);
    const mainColors=allNums.map(n=>colorFn(n));

    // Bonus pool balls - use preset bonus color
    const bonusNums=[];const bonusColors=[];
    const bonusClr=(activePreset?.bonus?.color)||'#2980b9';
    if(bonusConfig){
        const bRange=bonusConfig.end-bonusConfig.start+1;
        for(let i=0;i<bRange;i++){bonusNums.push(bonusConfig.start+i);bonusColors.push(bonusClr)}
    }

    document.getElementById('setupWrap').style.display='none';
    document.getElementById('gameScreen').style.display='block';
    initCanvas();
    drawnResults=[];drawnBalls=[];

    // Check if this is a separate-pool preset (like China 双色球)
    const isSeparatePool=activePreset&&activePreset.separatePool&&bonusConfig;

    if(isSeparatePool){
        // PHASE 1: Load main (red) balls only
        createBalls(allNums,mainColors);
        lastTime=0;animId=requestAnimationFrame(loop);
        startSeparatePoolDraw(allNums,mainColors,count,bonusNums,bonusColors,bonusConfig.draw);
    }else{
        // Standard: all balls in one machine
        const allLabels=[...allNums,...bonusNums];
        const allColors=[...mainColors,...bonusColors];
        createBalls(allLabels,allColors);
        lastTime=0;animId=requestAnimationFrame(loop);
        startStandardDraw(allNums.length,count,bonusNums.length,bonusConfig?bonusConfig.draw:0);
    }
}

/* === Standard draw (single machine, all balls together) === */
function startStandardDraw(mainPoolSize,mainCount,bonusPoolSize,bonusCount){
    drawnBalls=[];currentDrawn=0;drawing=true;
    drawQueue=[];
    const mainIndices=[...Array(mainPoolSize).keys()];
    for(let i=mainIndices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mainIndices[i],mainIndices[j]]=[mainIndices[j],mainIndices[i]]}
    for(let i=0;i<Math.min(mainCount,mainPoolSize);i++)drawQueue.push({idx:mainIndices[i],isBonus:false});
    if(bonusCount>0&&bonusPoolSize>0){
        const bonusIndices=[...Array(bonusPoolSize).keys()].map(i=>i+mainPoolSize);
        for(let i=bonusIndices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bonusIndices[i],bonusIndices[j]]=[bonusIndices[j],bonusIndices[i]]}
        for(let i=0;i<Math.min(bonusCount,bonusPoolSize);i++)drawQueue.push({idx:bonusIndices[i],isBonus:true});
    }
    totalMainCount=mainCount;
    drawNextBall();
}
let totalMainCount=0;

/* === Separate pool draw (China 双色球 style: red machine → blue machine) === */
let separatePhase=0;// 0=main, 1=transition, 2=bonus
let pendingBonusNums=[],pendingBonusColors=[],pendingBonusCount=0;

function startSeparatePoolDraw(mainNums,mainColors,mainCount,bonusNums,bonusColors,bonusCount){
    separatePhase=0;
    pendingBonusNums=bonusNums;
    pendingBonusColors=bonusColors;
    pendingBonusCount=bonusCount;
    drawnBalls=[];currentDrawn=0;drawing=true;
    drawQueue=[];
    // Phase 1: draw from red balls
    const mainIndices=[...Array(mainNums.length).keys()];
    for(let i=mainIndices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[mainIndices[i],mainIndices[j]]=[mainIndices[j],mainIndices[i]]}
    for(let i=0;i<Math.min(mainCount,mainNums.length);i++)drawQueue.push({idx:mainIndices[i],isBonus:false});
    totalMainCount=mainCount;
    drawNextBall();
}

function transitionToBonusPool(){
    // Clear all remaining main balls from machine
    balls.forEach(b=>{b.drawn=true});
    separatePhase=1;

    // Brief pause, then load bonus balls
    setTimeout(()=>{
        // Create new bonus balls in the machine
        const n=pendingBonusNums.length;
        const newBalls=[];
        for(let i=0;i<n;i++){
            const angle=Math.random()*Math.PI*2;
            const dist=Math.random()*machineR*.7;
            newBalls.push({
                x:machineX+Math.cos(angle)*dist,
                y:machineY+Math.sin(angle)*dist,
                vx:(Math.random()-.5)*200,
                vy:(Math.random()-.5)*200,
                z:Math.random()*2-1,
                vz:(Math.random()-.5)*3,
                r:BALL_R,
                label:pendingBonusNums[i],
                color:pendingBonusColors[i%pendingBonusColors.length],
                drawn:false,
                exitAnim:0
            });
        }
        // Replace balls array with bonus balls
        balls=newBalls;
        separatePhase=2;

        // Build bonus draw queue
        const bonusIndices=[...Array(n).keys()];
        for(let i=bonusIndices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[bonusIndices[i],bonusIndices[j]]=[bonusIndices[j],bonusIndices[i]]}
        // Append to drawQueue
        const prevLen=drawQueue.length;
        for(let i=0;i<Math.min(pendingBonusCount,n);i++)drawQueue.push({idx:bonusIndices[i],isBonus:true});

        // Continue drawing
        setTimeout(drawNextBall,800);
    },1200);
}

function drawNextBall(){
    if(currentDrawn>=drawQueue.length){
        // Check if we need to transition to bonus pool
        if(separatePhase===0&&pendingBonusCount>0){
            gateOpen=false;
            transitionToBonusPool();
            return;
        }
        drawing=false;gateOpen=false;
        setTimeout(()=>{SFX.fanfare();setTimeout(showResult,1500)},500);
        return;
    }
    const item=drawQueue[currentDrawn];
    // Rolling time: 6s for main, 10s for bonus (more suspense)
    const rollTime=item.isBonus?9000+Math.random()*2000:5000+Math.random()*2000;
    // Show "rolling" state, then open gate near end
    setTimeout(()=>{
        gateOpen=true;
        setTimeout(()=>{
            const b=balls[item.idx];
            if(!b){currentDrawn++;setTimeout(drawNextBall,100);return}
            b.drawn=true;
            SFX.pop();
            drawnBalls.push({label:b.label,color:b.color,exitAnim:0,dispX:exitX,dispY:exitY,isBonus:item.isBonus});
            drawnResults.push({label:b.label,color:b.color,idx:item.idx,isBonus:item.isBonus});
            currentDrawn++;
            setTimeout(()=>{gateOpen=false;setTimeout(drawNextBall,800)},600);
        },800+Math.random()*400);
    },rollTime);
}

let confetti=[],confCanvas,confCtx;
function startConfetti(){confCanvas=document.getElementById('confettiCanvas');confCtx=confCanvas.getContext('2d');confCanvas.width=W||window.innerWidth;confCanvas.height=H||window.innerHeight;confetti=[];for(let i=0;i<120;i++)confetti.push({x:Math.random()*confCanvas.width,y:Math.random()*-confCanvas.height,vx:(Math.random()-.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,rv:(Math.random()-.5)*10,w:Math.random()*8+4,h:Math.random()*4+2,color:BALL_COLORS[Math.floor(Math.random()*BALL_COLORS.length)],life:3+Math.random()*2});let lt=0;function cl(ts){const dt=Math.min((ts-(lt||ts))/1000,.05);lt=ts;confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);confetti=confetti.filter(c=>{c.life-=dt;if(c.life<=0)return false;c.x+=c.vx;c.y+=c.vy;c.rot+=c.rv;c.vy+=.1;confCtx.save();confCtx.translate(c.x,c.y);confCtx.rotate(c.rot*Math.PI/180);confCtx.globalAlpha=Math.min(1,c.life);confCtx.fillStyle=c.color;confCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);confCtx.restore();return true});if(confetti.length)requestAnimationFrame(cl)}requestAnimationFrame(cl)}

    window.addEventListener('resize',()=>{if(document.getElementById('gameScreen').style.display==='block')resizeCanvas()});
}
init();
</script>
