*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#FF6B35;--secondary:#00D9FF;--accent:#FFE66D;--danger:#FF3366;--success:#00FF88;--dark:#0A0A1A}
body{font-family:'Noto Sans KR',sans-serif;background:var(--dark);min-height:100vh;overflow-x:hidden;color:#fff;-webkit-tap-highlight-color:transparent}

#dynamicBg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;background:radial-gradient(ellipse at 50% 40%,rgba(255,107,53,0.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 60%,rgba(0,217,255,0.06) 0%,transparent 50%),linear-gradient(180deg,#0A0A1A 0%,#12122A 50%,#0A0A1A 100%)}
.stars{position:fixed;width:100%;height:100%;pointer-events:none;z-index:-1}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.2;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* === Setup === */
#setupWrap{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;display:flex;justify-content:center;align-items:center;padding:10px;overflow-y:auto}
#setupScreen{background:linear-gradient(145deg,rgba(20,20,40,0.95),rgba(10,10,30,0.98));backdrop-filter:blur(30px);border-radius:24px;padding:24px 28px;text-align:center;border:2px solid rgba(255,107,53,0.2);box-shadow:0 25px 80px rgba(0,0,0,0.7),0 0 80px rgba(255,107,53,0.08);max-height:95vh;overflow-y:auto;width:560px;max-width:98vw}
#setupScreen::-webkit-scrollbar{width:6px}
#setupScreen::-webkit-scrollbar-thumb{background:var(--primary);border-radius:3px}
#setupScreen h1{font-family:'Orbitron',sans-serif;font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent),var(--danger));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
#setupScreen h2{font-family:'Orbitron',sans-serif;color:rgba(255,255,255,0.4);font-size:0.7em;margin-bottom:16px;letter-spacing:3px}

.lang-wrap{display:flex;flex-direction:column;align-items:center;gap:3px;margin-bottom:14px}
.lang-label{font-family:'Orbitron',sans-serif;font-size:0.55em;color:rgba(255,255,255,0.4);letter-spacing:2px}
.lang-bar{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:340px}
.lang-btn{width:30px;height:22px;border:2px solid rgba(255,255,255,0.12);border-radius:5px;background:rgba(255,255,255,0.04);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.3s;padding:0;overflow:hidden}
.lang-btn img{width:22px;height:16px;object-fit:cover;border-radius:2px}
.lang-btn:hover{border-color:var(--primary);transform:scale(1.1)}
.lang-btn.active{border-color:var(--accent);background:rgba(255,230,109,0.15)}

.section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:12px}
.section h3{font-family:'Orbitron',sans-serif;font-size:0.8em;color:var(--primary);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}

.player-row{display:flex;align-items:center;gap:8px;margin:6px 0}
.player-row .dot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);flex-shrink:0}
.player-row input{flex:1;padding:8px 12px;border:2px solid transparent;border-radius:16px;background:rgba(255,255,255,0.08);color:#fff;font-size:0.9em;outline:none;transition:all 0.3s}
.player-row input:focus{background:rgba(255,255,255,0.12);border-color:var(--primary)}
.player-row input::placeholder{color:rgba(255,255,255,0.25)}
.player-row .remove-btn{width:26px;height:26px;border-radius:50%;border:none;background:rgba(255,51,102,0.5);color:#fff;font-size:1em;cursor:pointer;flex-shrink:0;transition:all 0.3s;display:flex;align-items:center;justify-content:center}
.player-row .remove-btn:hover{background:var(--danger);transform:scale(1.1)}
#addPlayerBtn{width:100%;padding:9px;margin-top:6px;border:2px dashed rgba(255,255,255,0.15);border-radius:16px;background:rgba(255,255,255,0.02);color:rgba(255,255,255,0.4);font-size:0.85em;cursor:pointer;transition:all 0.3s}
#addPlayerBtn:hover{border-color:var(--success);color:var(--success)}

.btn-group{display:flex;gap:10px;margin-top:14px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 18px;font-size:0.85em;font-weight:700;color:#fff;border:none;border-radius:20px;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-2px)}
.floating-home{position:fixed;bottom:14px;left:14px;z-index:1000;width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.5);border:2px solid rgba(255,107,53,0.4);color:#fff;font-size:1.2em;display:flex;align-items:center;justify-content:center;text-decoration:none;backdrop-filter:blur(10px);transition:all 0.3s;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.floating-home:hover{background:rgba(255,107,53,0.3);border-color:var(--primary);transform:scale(1.1)}
#startBtn{padding:14px 36px;font-size:1.1em;font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:2px;background:linear-gradient(135deg,var(--primary),var(--danger));box-shadow:0 12px 35px rgba(255,107,53,0.4);animation:startPulse 2s ease-in-out infinite}
@keyframes startPulse{0%,100%{box-shadow:0 12px 35px rgba(255,107,53,0.4)}50%{box-shadow:0 16px 45px rgba(255,107,53,0.6)}}

/* === GAME === */
#gameScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:50;background:linear-gradient(180deg,#0A0A1A 0%,#12122A 50%,#0A0A1A 100%)}
.game-wrap{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;position:relative}

/* Canvas */
#wheelCanvas{display:block;touch-action:none;cursor:grab}
#wheelCanvas:active{cursor:grabbing}

/* Spin button */
#spinBtn{position:absolute;z-index:10;width:80px;height:80px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);background:radial-gradient(circle at 35% 35%,#e74c3c,#c0392b,#922b21);color:#fff;font-family:'Orbitron',sans-serif;font-size:0.7em;font-weight:900;letter-spacing:1px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 2px 4px rgba(255,255,255,0.2);transition:all 0.15s;text-transform:uppercase}
#spinBtn:hover{transform:scale(1.08);box-shadow:0 6px 25px rgba(231,76,60,0.5),inset 0 2px 4px rgba(255,255,255,0.2)}
#spinBtn:active{transform:scale(0.95)}
#spinBtn:disabled{opacity:0.5;cursor:not-allowed;transform:none}

.msg-bar{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);text-align:center;padding:10px 24px;font-size:1em;font-weight:700;color:var(--accent);background:rgba(0,0,0,0.5);border-radius:20px;backdrop-filter:blur(8px);border:1px solid rgba(255,230,109,0.15);max-width:90%;white-space:nowrap}
.msg-bar.winner-msg{color:#fff;background:linear-gradient(135deg,rgba(255,107,53,0.3),rgba(255,51,102,0.3));border-color:var(--primary);animation:winPulse 0.6s ease-out}
@keyframes winPulse{0%{transform:translateX(-50%) scale(0.8);opacity:0}50%{transform:translateX(-50%) scale(1.05)}100%{transform:translateX(-50%) scale(1);opacity:1}}

/* Home btn overlay */
.top-btns{position:absolute;top:12px;left:12px;z-index:20;display:flex;gap:8px}
.top-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.4);color:rgba(255,255,255,0.6);font-size:0.75em;font-weight:700;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.3s;text-decoration:none}
.top-btn:hover{background:rgba(255,255,255,0.1);color:#fff}

/* === Result === */
#resultScreen{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;justify-content:center;align-items:center;background:rgba(5,5,15,0.92);backdrop-filter:blur(10px);padding:20px;overflow-y:auto}
.result-card{background:linear-gradient(145deg,rgba(15,15,35,0.98),rgba(25,25,55,0.98));border-radius:24px;padding:30px;text-align:center;border:2px solid var(--accent);box-shadow:0 0 80px rgba(255,230,109,0.2);width:480px;max-width:96vw;max-height:90vh;overflow-y:auto}
.result-card h1{font-family:'Orbitron',sans-serif;font-size:1.8em;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.winner-display{padding:20px;margin:10px 0;border-radius:16px;background:linear-gradient(135deg,rgba(255,107,53,0.15),rgba(255,230,109,0.1));border:2px solid rgba(255,230,109,0.3)}
.winner-display .w-label{font-size:0.85em;color:rgba(255,255,255,0.5);margin-bottom:8px}
.winner-display .w-name{font-family:'Orbitron',sans-serif;font-size:1.6em;font-weight:900;color:var(--accent)}

.share-panel{margin-top:16px}
.share-panel h3{font-family:'Orbitron',sans-serif;font-size:0.75em;color:var(--secondary);margin-bottom:8px;letter-spacing:2px}
.share-buttons{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.share-btn{display:flex;align-items:center;gap:5px;padding:7px 12px;border:none;border-radius:16px;font-size:0.75em;font-weight:700;color:#fff;cursor:pointer;transition:all 0.3s}
.share-btn:hover{transform:translateY(-2px);filter:brightness(1.15)}
.share-btn.kakao{background:#FEE500;color:#3C1E1E}.share-btn.line{background:#06C755}.share-btn.whatsapp{background:#25D366}.share-btn.telegram{background:#0088CC}.share-btn.twitter{background:#1DA1F2}.share-btn.facebook{background:#1877F2}.share-btn.copy-link{background:linear-gradient(135deg,#667,#445)}.share-btn.native-share{background:linear-gradient(135deg,var(--primary),var(--accent));display:none}
.share-toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--success);color:#000;padding:10px 24px;border-radius:20px;font-weight:700;z-index:400;display:none}

.result-btns{display:flex;gap:10px;margin-top:16px;justify-content:center;flex-wrap:wrap}
.result-btns .btn{padding:10px 20px}
.btn-replay{background:linear-gradient(135deg,var(--primary),var(--danger))}

#confettiCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:350}

@media(max-width:500px){
    #setupScreen{padding:16px 12px}
    #setupScreen h1{font-size:1.3em}
    .player-row input{font-size:0.82em;padding:6px 10px}
    #spinBtn{width:60px;height:60px;font-size:0.55em}
    .msg-bar{font-size:0.82em;padding:8px 16px;bottom:12px}
    .result-card{padding:20px 14px}
    .result-card h1{font-size:1.3em}
    .lang-btn{width:26px;height:19px}.lang-btn img{width:20px;height:14px}
    .floating-home{width:38px;height:38px;font-size:1em;bottom:10px;left:10px}
}
    </style>

let lang='en';
function T(k,v){let s=(I18N[lang]&&I18N[lang][k])||I18N.en[k]||k;if(v)Object.keys(v).forEach(x=>{s=s.replace('{'+x+'}',v[x])});return s}

const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#00bcd4','#ff6b81','#a29bfe','#fd79a8','#00cec9'];
const DARK_COLORS=['#c0392b','#2980b9','#27ae60','#d68910','#8e44ad','#16a085','#ca6f1e','#0097a7','#e84363','#6c5ce7','#e84393','#00b5ad'];
let playerCount=4,players=[],spinning=false;

/* Audio */
const SFX=(()=>{let c;function g(){if(!c)c=new(window.AudioContext||window.webkitAudioContext)();return c}
function p(f,d,t='sine',v=0.12){try{const x=g(),o=x.createOscillator(),ga=x.createGain();o.type=t;o.frequency.value=f;ga.gain.setValueAtTime(v,x.currentTime);ga.gain.exponentialRampToValueAtTime(0.001,x.currentTime+d);o.connect(ga);ga.connect(x.destination);o.start();o.stop(x.currentTime+d)}catch(e){}}
return{tick(){p(1800,0.02,'square',0.06)},win(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>p(f,0.25,'sine',0.18),i*100))},click(){p(600,0.04,'square',0.08)},g}
})();

/* Stars */
function createStars(){const c=document.getElementById('starsContainer');for(let i=0;i<60;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2.5+0.5;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${Math.random()*3+2}s;animation-delay:${Math.random()*3}s`;c.appendChild(s)}}

/* Setup */
function renderPlayers(){const c=document.getElementById('playerInputs');const existing=[...c.querySelectorAll('input')].map(inp=>inp.value);c.innerHTML='';for(let i=0;i<playerCount;i++){const r=document.createElement('div');r.className='player-row';r.innerHTML=`<span class="dot" style="background:${COLORS[i%COLORS.length]}"></span><input type="text" placeholder="${T('playerN',{n:i+1})}" maxlength="20"><button class="remove-btn">&times;</button>`;c.appendChild(r)}c.querySelectorAll('input').forEach((inp,i)=>{if(existing[i])inp.value=existing[i]});c.querySelectorAll('.remove-btn').forEach(b=>b.addEventListener('click',()=>{if(playerCount<=2)return;playerCount--;renderPlayers()}))}

function applyLanguage(){
    document.getElementById('titleText').textContent=T('title');document.getElementById('subtitleText').textContent=T('subtitle');document.getElementById('playersTitle').textContent=T('players');document.getElementById('addPlayerText').textContent=T('addPlayer');document.getElementById('startBtn').textContent=T('start');document.getElementById('resultH1').textContent='🎯 '+T('result');document.getElementById('wLabel').textContent=T('result');document.getElementById('shareH3').textContent='📢 '+T('share');document.getElementById('replayText').textContent=T('replay');document.getElementById('setupText').textContent=T('settings');document.getElementById('spinBtn').textContent=T('spin');
    document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===lang));renderPlayers();
}

function collectData(){const ne=document.querySelectorAll('#playerInputs input');players=[];ne.forEach((e,i)=>players.push({name:e.value.trim()||T('playerN',{n:i+1}),color:COLORS[i%COLORS.length],dark:DARK_COLORS[i%DARK_COLORS.length]}))}

/* ============================================
   CANVAS ROULETTE WHEEL - 60fps smooth
============================================ */
let canvas,ctx,dpr,W,H,cx,cy,radius;
let angle=0;         // current rotation in radians
let velocity=0;      // radians per second
let lastTick=-1;     // which segment last ticked
let selectedIdx=-1;
let animId;

function initCanvas(){
    canvas=document.getElementById('wheelCanvas');
    ctx=canvas.getContext('2d');
    dpr=window.devicePixelRatio||1;
    resize();
}

function resize(){
    const wrap=canvas.parentElement;
    W=wrap.clientWidth;H=wrap.clientHeight;
    const maxR=Math.min(W,H)*0.42;
    radius=Math.min(maxR,280);
    canvas.width=W*dpr;canvas.height=H*dpr;
    canvas.style.width=W+'px';canvas.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cx=W/2;cy=H/2;
    // Position spin button
    const btn=document.getElementById('spinBtn');
    btn.style.left=(cx-btn.offsetWidth/2)+'px';
    btn.style.top=(cy-btn.offsetHeight/2)+'px';
}

function drawWheel(){
    ctx.clearRect(0,0,W,H);
    const n=players.length;
    const sliceAngle=Math.PI*2/n;

    ctx.save();
    ctx.translate(cx,cy);

    // Outer shadow
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=40;
    ctx.shadowOffsetY=8;
    ctx.beginPath();ctx.arc(0,0,radius+8,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.01)';ctx.fill();
    ctx.restore();

    // Outer ring (gold)
    ctx.beginPath();ctx.arc(0,0,radius+8,0,Math.PI*2);
    const ringGrad=ctx.createRadialGradient(0,0,radius,0,0,radius+8);
    ringGrad.addColorStop(0,'#b8860b');ringGrad.addColorStop(0.5,'#ffd700');ringGrad.addColorStop(1,'#b8860b');
    ctx.fillStyle=ringGrad;ctx.fill();

    // Notches on ring
    for(let i=0;i<n;i++){
        const a=angle+i*sliceAngle;
        const nx=Math.cos(a)*(radius+4);
        const ny=Math.sin(a)*(radius+4);
        ctx.beginPath();ctx.arc(nx,ny,3,0,Math.PI*2);
        ctx.fillStyle='#8B6914';ctx.fill();
    }

    // Draw slices
    for(let i=0;i<n;i++){
        const startA=angle+i*sliceAngle;
        const endA=startA+sliceAngle;

        // Slice fill
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,radius,startA,endA);ctx.closePath();
        const grad=ctx.createRadialGradient(0,0,radius*0.15,0,0,radius);
        grad.addColorStop(0,players[i].color);grad.addColorStop(1,players[i].dark);
        ctx.fillStyle=grad;ctx.fill();

        // Slice border
        ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1.5;ctx.stroke();

        // Inner shine
        ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,radius*0.92,startA,endA);ctx.closePath();
        ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;ctx.stroke();

        // Text
        const midA=startA+sliceAngle/2;
        ctx.save();ctx.rotate(midA);
        ctx.textAlign='right';ctx.textBaseline='middle';
        const fontSize=Math.min(16,radius*0.12,sliceAngle*radius*0.3);
        ctx.font=`bold ${fontSize}px 'Noto Sans KR',sans-serif`;
        ctx.fillStyle='#fff';
        ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=3;
        const maxTextW=radius*0.55;
        let txt=players[i].name;
        if(ctx.measureText(txt).width>maxTextW){while(txt.length>1&&ctx.measureText(txt+'…').width>maxTextW)txt=txt.slice(0,-1);txt+='…'}
        ctx.fillText(txt,radius*0.88,0,maxTextW);
        ctx.restore();
    }

    // Center hub
    const hubR=radius*0.18;
    ctx.beginPath();ctx.arc(0,0,hubR+3,0,Math.PI*2);
    const hubRing=ctx.createRadialGradient(0,0,hubR,0,0,hubR+3);
    hubRing.addColorStop(0,'#ffd700');hubRing.addColorStop(1,'#b8860b');
    ctx.fillStyle=hubRing;ctx.fill();

    ctx.beginPath();ctx.arc(0,0,hubR,0,Math.PI*2);
    const hubGrad=ctx.createRadialGradient(-hubR*0.3,-hubR*0.3,0,0,0,hubR);
    hubGrad.addColorStop(0,'#555');hubGrad.addColorStop(0.7,'#222');hubGrad.addColorStop(1,'#111');
    ctx.fillStyle=hubGrad;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.stroke();

    ctx.restore();

    // Pointer (top center triangle)
    const ptrX=cx,ptrY=cy-radius-8;
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=8;
    ctx.beginPath();
    ctx.moveTo(ptrX,ptrY+28);
    ctx.lineTo(ptrX-14,ptrY-4);
    ctx.lineTo(ptrX+14,ptrY-4);
    ctx.closePath();
    const ptrGrad=ctx.createLinearGradient(ptrX,ptrY-4,ptrX,ptrY+28);
    ptrGrad.addColorStop(0,'#ffd700');ptrGrad.addColorStop(1,'#ff6b35');
    ctx.fillStyle=ptrGrad;ctx.fill();
    ctx.strokeStyle='#b8860b';ctx.lineWidth=2;ctx.stroke();
    ctx.restore();
}

function getSelectedIndex(){
    const n=players.length;
    const sliceAngle=Math.PI*2/n;
    // Pointer is at top = -PI/2
    // Normalize angle
    let a=((-Math.PI/2-angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
    return Math.floor(a/sliceAngle)%n;
}

/* Physics tick sound */
function checkTick(){
    const idx=getSelectedIndex();
    if(idx!==lastTick){lastTick=idx;if(velocity>0.3)SFX.tick()}
}

/* Main animation loop */
let lastTime=0;
function loop(ts){
    const dt=Math.min((ts-(lastTime||ts))/1000,0.05);
    lastTime=ts;

    if(velocity>0.001){
        // Friction: exponential decay
        const friction=spinning?0.985:0.97;
        velocity*=Math.pow(friction,dt*60);
        angle+=velocity*dt;

        // Normalize angle
        angle=angle%(Math.PI*2);

        checkTick();

        // Stopped?
        if(velocity<0.08&&!spinning){
            velocity=0;
            selectedIdx=getSelectedIndex();
            onStopped();
        }
    }

    drawWheel();
    animId=requestAnimationFrame(loop);
}

function onStopped(){
    const name=players[selectedIdx].name;
    const msg=document.getElementById('msgBar');
    msg.textContent=T('selected',{name});
    msg.className='msg-bar winner-msg';
    document.getElementById('spinBtn').disabled=false;
    SFX.win();

    // Show result after delay
    setTimeout(()=>showResult(name),2000);
}

/* Spin */
function doSpin(){
    if(velocity>0.5)return;
    SFX.g();SFX.click();
    spinning=true;
    selectedIdx=-1;
    velocity=15+Math.random()*12;// 15-27 rad/s initial
    document.getElementById('spinBtn').disabled=true;
    const msg=document.getElementById('msgBar');
    msg.textContent=T('spinning');msg.className='msg-bar';

    // Release after random time (controls where it stops)
    const holdTime=2000+Math.random()*2000;
    setTimeout(()=>{spinning=false},holdTime);
}

/* Swipe/drag to spin */
let dragStart=null,dragAngle=0,dragTime=0;
function onPointerDown(e){
    if(velocity>0.5)return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX||e.touches?.[0]?.clientX)-r.left-cx;
    const y=(e.clientY||e.touches?.[0]?.clientY)-r.top-cy;
    const dist=Math.sqrt(x*x+y*y);
    if(dist<radius*0.2||dist>radius+30)return;// ignore center & outside
    dragStart={x,y,a:Math.atan2(y,x),t:performance.now()};dragAngle=angle;
}
function onPointerMove(e){
    if(!dragStart)return;
    e.preventDefault();
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX||e.touches?.[0]?.clientX)-r.left-cx;
    const y=(e.clientY||e.touches?.[0]?.clientY)-r.top-cy;
    const a=Math.atan2(y,x);
    const da=a-dragStart.a;
    angle=dragAngle+da;
    dragTime=performance.now();
}
function onPointerUp(e){
    if(!dragStart)return;
    const r=canvas.getBoundingClientRect();
    const x=(e.clientX||e.changedTouches?.[0]?.clientX)-r.left-cx;
    const y=(e.clientY||e.changedTouches?.[0]?.clientY)-r.top-cy;
    const a=Math.atan2(y,x);
    const da=a-dragStart.a;
    const dt=(performance.now()-dragStart.t)/1000;
    dragStart=null;
    if(dt<0.01)return;
    const swipeVel=da/dt;
    if(Math.abs(swipeVel)>2){
        SFX.g();SFX.click();
        velocity=Math.min(Math.abs(swipeVel)*1.5,30);
        if(swipeVel<0)velocity=-velocity;// we only spin positive
        velocity=Math.abs(velocity);
        spinning=true;selectedIdx=-1;
        document.getElementById('spinBtn').disabled=true;
        document.getElementById('msgBar').textContent=T('spinning');
        document.getElementById('msgBar').className='msg-bar';
        setTimeout(()=>{spinning=false},1500+Math.random()*1500);
    }
}

/* Result */
function showResult(name){
    document.getElementById('gameScreen').style.display='none';
    document.getElementById('resultScreen').style.display='flex';
    document.getElementById('wName').textContent=name;
    startConfetti();buildShareButtons(name);
}

/* Share */
function buildShareButtons(name){
    const text=`NotMePlz Roulette 🎯\n${T('selected',{name})}\nhttps://notmeplz.com/games/roulette/`;
    const enc=encodeURIComponent(text);const eu=encodeURIComponent('https://notmeplz.com/games/roulette/');
    let h=`<button class="share-btn kakao" onclick="copyShareLink()">💬 Kakao</button><button class="share-btn line" onclick="window.open('https://social-plugins.line.me/lineit/share?url=${eu}&text=${enc}')">💚 LINE</button><button class="share-btn whatsapp" onclick="window.open('https://wa.me/?text=${enc}')">💬 WhatsApp</button><button class="share-btn telegram" onclick="window.open('https://t.me/share/url?url=${eu}&text=${enc}')">✈️ Telegram</button><button class="share-btn twitter" onclick="window.open('https://twitter.com/intent/tweet?text=${enc}')">🐦 X</button><button class="share-btn facebook" onclick="window.open('https://www.facebook.com/sharer/sharer.php?u=${eu}')">👍 Facebook</button><button class="share-btn copy-link" onclick="copyShareLink()">🔗 Copy</button>`;
    if(navigator.share)h+=`<button class="share-btn native-share" style="display:flex" onclick="nativeShareR()">📤 Share</button>`;
    document.getElementById('shareButtons').innerHTML=h;window._shareText=text;
}
function copyShareLink(){navigator.clipboard.writeText(window._shareText).then(()=>{const t=document.getElementById('shareToast');t.textContent=T('copied');t.style.display='block';setTimeout(()=>t.style.display='none',2000)})}
function nativeShareR(){navigator.share({title:'NotMePlz Roulette 🎯',text:window._shareText,url:'https://notmeplz.com/games/roulette/'}).catch(()=>{})}

/* Confetti */
let confetti=[],confCanvas,confCtx;
function startConfetti(){confCanvas=document.getElementById('confettiCanvas');confCtx=confCanvas.getContext('2d');confCanvas.width=window.innerWidth;confCanvas.height=window.innerHeight;confetti=[];for(let i=0;i<120;i++)confetti.push({x:Math.random()*confCanvas.width,y:Math.random()*-confCanvas.height,vx:(Math.random()-0.5)*3,vy:Math.random()*4+2,rot:Math.random()*360,rv:(Math.random()-0.5)*10,w:Math.random()*8+4,h:Math.random()*4+2,color:COLORS[Math.floor(Math.random()*COLORS.length)],life:3+Math.random()*2});let lt=0;function cl(ts){const dt=Math.min((ts-(lt||ts))/1000,0.05);lt=ts;confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);confetti=confetti.filter(c=>{c.life-=dt;if(c.life<=0)return false;c.x+=c.vx;c.y+=c.vy;c.rot+=c.rv;c.vy+=0.1;confCtx.save();confCtx.translate(c.x,c.y);confCtx.rotate(c.rot*Math.PI/180);confCtx.globalAlpha=Math.min(1,c.life);confCtx.fillStyle=c.color;confCtx.fillRect(-c.w/2,-c.h/2,c.w,c.h);confCtx.restore();return true});if(confetti.length)requestAnimationFrame(cl)}requestAnimationFrame(cl)}

/* Start game */
function startGame(){
    collectData();
    document.getElementById('setupWrap').style.display='none';
    document.getElementById('gameScreen').style.display='block';
    initCanvas();
    angle=Math.random()*Math.PI*2;velocity=0;lastTick=-1;selectedIdx=-1;
    const msg=document.getElementById('msgBar');msg.textContent=T('tapToSpin');msg.className='msg-bar';
    document.getElementById('spinBtn').disabled=false;
    lastTime=0;
    if(animId)cancelAnimationFrame(animId);
    animId=requestAnimationFrame(loop);
}

function backToSetup(){
    if(animId)cancelAnimationFrame(animId);
    document.getElementById('gameScreen').style.display='none';
    document.getElementById('resultScreen').style.display='none';
    document.getElementById('setupWrap').style.display='flex';
    confetti=[];if(confCtx)confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
}

/* Init */
function init(){
    const saved=localStorage.getItem('gloryCarRacing_lang');
    if(saved&&I18N[saved])lang=saved;else{const m={'ko':'ko','en':'en','es':'es','de':'de','fr':'fr','ja':'ja','zh':'zh','pt':'pt','ru':'ru','ar':'ar','hi':'hi','th':'th','id':'id','vi':'vi','tr':'tr'};const ls=navigator.languages||[navigator.language||'en'];for(const l of ls){if(l.toLowerCase()==='en-gb'){lang='gb';break}const p=l.split('-')[0].toLowerCase();if(m[p]){lang=m[p];break}}}
    createStars();applyLanguage();

    document.getElementById('langBar').addEventListener('click',e=>{const b=e.target.closest('.lang-btn');if(!b)return;lang=b.dataset.lang;localStorage.setItem('gloryCarRacing_lang',lang);applyLanguage()});
    document.getElementById('addPlayerBtn').addEventListener('click',()=>{if(playerCount>=12)return;playerCount++;renderPlayers()});
    document.getElementById('startBtn').addEventListener('click',startGame);
    document.getElementById('spinBtn').addEventListener('click',doSpin);
    document.getElementById('backBtn').addEventListener('click',backToSetup);
    document.getElementById('replayBtn').addEventListener('click',()=>{confetti=[];if(confCtx)confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);document.getElementById('resultScreen').style.display='none';document.getElementById('gameScreen').style.display='block';velocity=0;selectedIdx=-1;document.getElementById('spinBtn').disabled=false;document.getElementById('msgBar').textContent=T('tapToSpin');document.getElementById('msgBar').className='msg-bar';lastTime=0;if(animId)cancelAnimationFrame(animId);animId=requestAnimationFrame(loop)});
    document.getElementById('backToSetupBtn').addEventListener('click',backToSetup);

    // Canvas events
    const cv=document.getElementById('wheelCanvas');
    cv.addEventListener('mousedown',onPointerDown);
    cv.addEventListener('mousemove',onPointerMove);
    cv.addEventListener('mouseup',onPointerUp);
    cv.addEventListener('mouseleave',()=>{if(dragStart)onPointerUp({clientX:0,clientY:0})});
    cv.addEventListener('touchstart',e=>{e.preventDefault();onPointerDown(e)},{passive:false});
    cv.addEventListener('touchmove',e=>{e.preventDefault();onPointerMove(e)},{passive:false});
    cv.addEventListener('touchend',e=>{onPointerUp(e)},{passive:false});

    window.addEventListener('resize',()=>{if(document.getElementById('gameScreen').style.display==='block')resize()});
}
init();
</script>
